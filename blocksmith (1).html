<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Blocksmith — Roblox script builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Block engine. NOTE: the *minified* cdnjs builds are broken (invalid syntax), so we load the non-min files. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blockly_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blocks_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/lua_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/msg/en.js"></script>

<style>
  :root{
    --ink:#0C1320; --ink-2:#0F1828; --surface:#131D31; --surface-2:#172339;
    --line:#243249; --line-2:#2d3d5a;
    --text:#E9EEF7; --muted:#93A1BC; --muted-2:#62718c;
    --gold:#E8B04B; --gold-bright:#F4C667; --gold-deep:#C8902F;
    --danger:#E2705B;
    --code-bg:#0A0F1A;
    --tok-k:#E8B04B; --tok-s:#86D69B; --tok-c:#586A85; --tok-n:#6FC9C0; --tok-g:#C5A6F2;
    --r:14px; --r-sm:10px;
    --shadow:0 18px 48px rgba(0,0,0,.45);
    --hdr:60px;
    --display:"Fraunces", Georgia, "Times New Roman", serif;
    --ui:"Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(232,176,75,.08), transparent 60%),
      var(--ink);
    color:var(--text); font-family:var(--ui);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    height:var(--hdr); flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:0 16px; background:rgba(14,21,37,.86); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); z-index:30; position:relative;
  }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; }
  .logo-mark{ width:30px; height:30px; flex:0 0 auto; filter:drop-shadow(0 3px 6px rgba(232,176,75,.25)); }
  .brand-text{ display:flex; flex-direction:column; line-height:1; min-width:0; }
  .brand-name{ font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:.2px; }
  .brand-name b{ color:var(--gold); font-weight:600; }
  .brand-sub{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2); margin-top:3px; white-space:nowrap; }

  .actions{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .btn{
    font-family:var(--ui); font-weight:600; font-size:13px; cursor:pointer;
    border-radius:var(--r-sm); padding:9px 13px; border:1px solid var(--line-2);
    background:var(--surface); color:var(--text); transition:.16s ease; white-space:nowrap;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{ border-color:var(--gold-deep); background:var(--surface-2); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn svg{ width:15px; height:15px; opacity:.85; }
  .btn-ghost{ background:transparent; }
  .btn-primary{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#241803;
    border-color:var(--gold-deep); font-weight:700; box-shadow:0 6px 16px rgba(232,176,75,.22);
  }
  .btn-primary:hover{ filter:brightness(1.05); border-color:var(--gold-deep); }
  .btn-danger{ background:transparent; color:var(--danger); border-color:#5a3a36; }
  .btn-danger:hover{ background:rgba(226,112,91,.12); border-color:var(--danger); }
  .btn-icon{ padding:8px; border-color:var(--line); background:transparent; }
  .lbl-sm{ display:inline; }

  /* ---------- Main split ---------- */
  #main{ flex:1 1 auto; display:flex; min-height:0; position:relative; }
  .blockly-wrap{ flex:1.7 1 0; position:relative; min-width:0; }
  #blocklyDiv{ position:absolute; inset:0; }

  .divider{ width:1px; flex:0 0 auto; background:linear-gradient(180deg, transparent, var(--line-2) 18%, var(--line-2) 82%, transparent); }

  .code-wrap{
    flex:1 1 0; min-width:340px; max-width:560px; display:flex; flex-direction:column;
    background:var(--ink-2); border-left:1px solid var(--line); position:relative;
  }
  .code-head{
    flex:0 0 auto; height:46px; display:flex; align-items:center; gap:10px; padding:0 12px 0 16px;
    border-bottom:1px solid var(--line); position:relative;
  }
  .code-head::before{ content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px; background:linear-gradient(180deg,var(--gold-bright),var(--gold-deep)); }
  .code-title{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .code-flow{ font-size:11px; color:var(--muted-2); letter-spacing:.04em; }
  .code-flow b{ color:var(--gold); font-weight:600; }
  .code-head .right{ margin-left:auto; display:flex; gap:6px; align-items:center; }

  .code-scroll{ flex:1 1 auto; overflow:auto; background:var(--code-bg); position:relative; }
  .code-inner{ display:flex; min-height:100%; min-width:max-content; }
  .gutter, .code{
    font-family:var(--mono); font-size:13px; line-height:1.62; font-variant-ligatures:none;
    padding-top:14px; padding-bottom:24px;
  }
  .gutter{
    position:sticky; left:0; z-index:2; flex:0 0 auto; text-align:right;
    padding-left:16px; padding-right:12px; color:var(--muted-2); user-select:none;
    background:var(--code-bg); border-right:1px solid #15203200; white-space:pre;
    box-shadow:1px 0 0 rgba(36,50,73,.6);
  }
  .code{ padding-left:18px; padding-right:24px; white-space:pre; color:#cfe; }
  .code code{ font:inherit; color:#D6E0F0; }
  .tok-k{ color:var(--tok-k); font-weight:600; }
  .tok-s{ color:var(--tok-s); }
  .tok-c{ color:var(--tok-c); font-style:italic; }
  .tok-n{ color:var(--tok-n); }
  .tok-g{ color:var(--tok-g); }

  .empty{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-align:center; padding:24px; color:var(--muted); pointer-events:none;
  }
  .empty .e-mark{ width:40px; height:40px; opacity:.5; }
  .empty p{ margin:0; font-size:13.5px; max-width:240px; line-height:1.5; }

  .fatal{ margin:24px; padding:20px 22px; color:#ffd9d2; background:rgba(226,112,91,.12);
    border:1px solid var(--danger); border-radius:12px; font-size:14px; line-height:1.55; max-width:440px; }
  .fatal b{ color:#fff; }

  /* mobile floating toggle */
  .fab{ display:none; }

  /* ---------- Modal ---------- */
  .modal{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:20px;
    background:rgba(6,10,18,.66); backdrop-filter:blur(4px); }
  .modal.show{ display:flex; animation:fade .18s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .dialog{ width:min(520px,100%); background:var(--surface); border:1px solid var(--line-2); border-radius:var(--r);
    box-shadow:var(--shadow); overflow:hidden; animation:pop .2s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop{ from{transform:translateY(10px) scale(.98); opacity:0} to{transform:none; opacity:1} }
  .dialog h2{ font-family:var(--display); font-weight:600; font-size:20px; margin:0; padding:20px 22px 6px; }
  .dialog .body{ padding:6px 22px 14px; color:#c9d4e6; font-size:14px; line-height:1.6; }
  .dialog .body p{ margin:10px 0; }
  .dialog .body b{ color:var(--text); }
  .dialog .body ol{ margin:10px 0; padding-left:20px; }
  .dialog .body li{ margin:7px 0; }
  .dialog .body .tip{ background:rgba(232,176,75,.08); border:1px solid rgba(232,176,75,.22); border-radius:10px; padding:11px 13px; font-size:13px; color:#d9e2f0; }
  .dialog .foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 22px 20px; border-top:1px solid var(--line); }

  /* ---------- Toast ---------- */
  #toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--line-2); color:var(--text);
    padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:.22s ease; z-index:80; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* Blockly dark polish */
  .blocklyToolboxDiv{ border-right:1px solid var(--line); }
  .blocklyFlyout{ z-index:5; }
  .blocklyMainBackground{ stroke:none; }
  .blocklyZoom image, .blocklyZoom>svg{ opacity:.85; }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px){
    :root{ --hdr:auto; }
    header{ flex-wrap:wrap; padding:10px 12px; gap:10px; }
    .actions{ width:100%; }
    .lbl-sm{ display:none; }
    .btn{ padding:9px 11px; }
    .code-wrap{
      position:fixed; left:0; right:0; top:0; bottom:0; max-width:none; z-index:40;
      transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1); border-left:none;
    }
    #main.show-code .code-wrap{ transform:translateY(0); }
    .divider{ display:none; }
    .fab{
      display:inline-flex; position:fixed; right:16px; bottom:18px; z-index:35;
      align-items:center; gap:8px; padding:13px 18px; border-radius:999px;
      background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803;
      border:none; font-weight:700; font-size:14px; font-family:var(--ui);
      box-shadow:0 10px 26px rgba(0,0,0,.4); cursor:pointer;
    }
  }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="4" y="5" width="16.5" height="9.5" rx="3.2" fill="var(--gold)"/>
        <rect x="11.5" y="16.5" width="16.5" height="9.5" rx="3.2" fill="var(--gold-deep)"/>
      </svg>
      <div class="brand-text">
        <div class="brand-name">Block<b>smith</b></div>
        <div class="brand-sub">Roblox script builder</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" id="newBtn" title="Clear the canvas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span class="lbl-sm">New</span>
      </button>
      <button class="btn btn-ghost" id="openBtn" title="Open a saved project (.json)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/></svg>
        <span class="lbl-sm">Open</span>
      </button>
      <button class="btn btn-ghost" id="saveBtn" title="Save your project to a file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        <span class="lbl-sm">Save</span>
      </button>
      <button class="btn btn-ghost" id="helpBtn" title="How to use this in Roblox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.6 2.2c-.8.4-1.1.9-1.1 1.8"/><path d="M12 17h.01"/></svg>
        <span class="lbl-sm">Help</span>
      </button>
      <button class="btn btn-primary" id="copyBtn" title="Copy the Lua code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
        Copy Lua
      </button>
    </div>
  </header>

  <div id="main">
    <div class="blockly-wrap">
      <div id="blocklyDiv"></div>
    </div>

    <div class="divider"></div>

    <aside class="code-wrap">
      <div class="code-head">
        <span class="code-title">Lua</span>
        <span class="code-flow">blocks <b>&rarr;</b> code</span>
        <div class="right">
          <button class="btn btn-icon" id="copyBtn2" title="Copy Lua">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
          </button>
          <button class="btn btn-icon" id="dlBtn" title="Download .lua file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 21h14"/></svg>
          </button>
          <button class="btn btn-icon" id="closeCode" title="Back to blocks" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
      </div>
      <div class="code-scroll">
        <div class="code-inner">
          <div class="gutter" id="gutter"></div>
          <pre class="code"><code id="codeOut"></code></pre>
        </div>
        <div class="empty" id="empty">
          <svg class="e-mark" viewBox="0 0 32 32"><rect x="4" y="5" width="16.5" height="9.5" rx="3.2" fill="var(--muted)"/><rect x="11.5" y="16.5" width="16.5" height="9.5" rx="3.2" fill="var(--muted-2)"/></svg>
          <p>Snap blocks together on the left and your Roblox Lua appears here.</p>
        </div>
      </div>
    </aside>
  </div>

  <button class="fab" id="toggleCode">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l-3 3 3 3M16 9l3 3-3 3"/></svg>
    See Lua
  </button>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="dialog">
      <h2 id="modalTitle"></h2>
      <div class="body" id="modalBody"></div>
      <div class="foot" id="modalFoot"></div>
    </div>
  </div>

  <div id="toast"></div>

  <input type="file" id="fileInput" accept=".json,application/json" hidden />

<script id="app">
(function(){
  function start(){
  /* ============ Generator + Order setup (handles Blockly v12 API) ============ */
  var G = Blockly.Lua;
  var Order = (window.lua && window.lua.Order) ? window.lua.Order : {
    ATOMIC:0, HIGH:1, EXPONENTIATION:2, UNARY:3, MULTIPLICATIVE:4,
    ADDITIVE:5, CONCATENATION:6, RELATIONAL:7, AND:8, OR:9, NONE:99
  };
  function def(name, fn){ if (G.forBlock) { G.forBlock[name] = fn; } else { G[name] = fn; } }
  function V(g,b,n,d){ var c = g.valueToCode(b,n,Order.NONE); return (c===''||c==null) ? d : c; }
  function F(b,n){ return b.getFieldValue(n); }
  function R(name, fn){ def(name, function(b,g){ return [fn(b,g), Order.ATOMIC]; }); }
  function S(name, fn){ def(name, function(b,g){ return fn(b,g) + '\n'; }); }

  /* ============ Dropdown option lists ============ */
  var PROP_OPTIONS = [
    ["Name","Name"],["Position","Position"],["Size","Size"],["Color","Color"],["BrickColor","BrickColor"],
    ["Material","Material"],["Transparency","Transparency"],["Reflectance","Reflectance"],["Anchored","Anchored"],
    ["CanCollide","CanCollide"],["CanTouch","CanTouch"],["CFrame","CFrame"],["Orientation","Orientation"],
    ["Parent","Parent"],["Value","Value"],["Text","Text"],["Visible","Visible"],["Health","Health"],
    ["MaxHealth","MaxHealth"],["WalkSpeed","WalkSpeed"],["JumpPower","JumpPower"],["Enabled","Enabled"],["Locked","Locked"]
  ];
  var BRICK_OPTIONS = [
    ["Bright red","Bright red"],["Bright blue","Bright blue"],["Bright green","Bright green"],
    ["Bright yellow","Bright yellow"],["Bright orange","Bright orange"],["White","White"],["Black","Black"],
    ["Really red","Really red"],["Lime green","Lime green"],["New Yeller","New Yeller"],
    ["Hot pink","Hot pink"],["Royal purple","Royal purple"],["Medium stone grey","Medium stone grey"]
  ];
  var COMMON_OPTIONS = [
    ["the Workspace","workspace"],["the game","game"],["this script","script"],["this part","parent"],
    ["the player","player"],["the player's character","character"],["the touching part","otherpart"],
    ["the player who touched","touchplayer"]
  ];

  /* ============ Custom Roblox blocks ============ */
  Blockly.defineBlocksWithJsonArray([
    /* ---- Events ---- */
    {"type":"roblox_on_run","message0":"\u25B6 when the script runs %1","args0":[{"type":"input_statement","name":"DO"}],
     "colour":45,"tooltip":"The blocks inside run once, top to bottom, when the script starts.","helpUrl":""},
    {"type":"roblox_on_touched","message0":"when %1 is touched %2",
     "args0":[{"type":"input_value","name":"PART"},{"type":"input_statement","name":"DO"}],
     "inputsInline":true,"colour":45,"tooltip":"Runs whenever something touches this part. Use 'the touching part' inside.","helpUrl":""},
    {"type":"roblox_on_player_added","message0":"when a player joins the game %1","args0":[{"type":"input_statement","name":"DO"}],
     "colour":45,"tooltip":"Runs when a player joins. Use 'the player' inside.","helpUrl":""},
    {"type":"roblox_on_player_removing","message0":"when a player leaves the game %1","args0":[{"type":"input_statement","name":"DO"}],
     "colour":45,"tooltip":"Runs when a player leaves. Use 'the player' inside.","helpUrl":""},
    {"type":"roblox_on_clicked","message0":"when %1 is clicked %2",
     "args0":[{"type":"input_value","name":"DETECTOR"},{"type":"input_statement","name":"DO"}],
     "inputsInline":true,"colour":45,"tooltip":"Runs when a ClickDetector is clicked. Use 'the player' for who clicked.","helpUrl":""},
    {"type":"roblox_event_hit","message0":"the touching part","output":null,"colour":45,
     "tooltip":"The part that touched (use inside 'when ... is touched').","helpUrl":""},
    {"type":"roblox_event_player","message0":"the player","output":null,"colour":45,
     "tooltip":"The player from the surrounding event.","helpUrl":""},

    /* ---- Objects ---- */
    {"type":"roblox_game","message0":"game","output":null,"colour":195,"tooltip":"The whole game.","helpUrl":""},
    {"type":"roblox_workspace","message0":"Workspace","output":null,"colour":195,"tooltip":"The 3D world.","helpUrl":""},
    {"type":"roblox_script","message0":"this script","output":null,"colour":195,
     "tooltip":"The script itself. \u201Cthis script's Parent\u201D is the object it sits inside.","helpUrl":""},
    {"type":"roblox_get_service","message0":"get service %1",
     "args0":[{"type":"field_dropdown","name":"SERVICE","options":[
       ["Players","Players"],["ReplicatedStorage","ReplicatedStorage"],["ServerStorage","ServerStorage"],
       ["ServerScriptService","ServerScriptService"],["StarterGui","StarterGui"],["StarterPlayer","StarterPlayer"],
       ["Lighting","Lighting"],["SoundService","SoundService"],["RunService","RunService"],["TweenService","TweenService"],
       ["Debris","Debris"],["UserInputService","UserInputService"],["CollectionService","CollectionService"],
       ["Teams","Teams"],["MarketplaceService","MarketplaceService"],["DataStoreService","DataStoreService"]
     ]}],"output":null,"colour":195,"tooltip":"Get a Roblox service.","helpUrl":""},
    {"type":"roblox_new_instance","message0":"a new %1",
     "args0":[{"type":"field_dropdown","name":"CLASS","options":[
       ["Part","Part"],["WedgePart","WedgePart"],["MeshPart","MeshPart"],["SpawnLocation","SpawnLocation"],
       ["Model","Model"],["Folder","Folder"],["Sound","Sound"],["ParticleEmitter","ParticleEmitter"],
       ["PointLight","PointLight"],["SpotLight","SpotLight"],["ClickDetector","ClickDetector"],["ProximityPrompt","ProximityPrompt"],
       ["Tool","Tool"],["RemoteEvent","RemoteEvent"],["BindableEvent","BindableEvent"],
       ["IntValue","IntValue"],["StringValue","StringValue"],["BoolValue","BoolValue"],["NumberValue","NumberValue"],
       ["ScreenGui","ScreenGui"],["Frame","Frame"],["TextLabel","TextLabel"],["TextButton","TextButton"],["ImageLabel","ImageLabel"],
       ["Decal","Decal"],["Fire","Fire"],["Smoke","Smoke"],["Attachment","Attachment"],["WeldConstraint","WeldConstraint"]
     ]}],"output":null,"colour":195,"tooltip":"Create a new object (Instance.new).","helpUrl":""},
    {"type":"roblox_find_child","message0":"%1 \u25B8 find child %2",
     "args0":[{"type":"input_value","name":"PARENT"},{"type":"input_value","name":"NAME"}],
     "inputsInline":true,"output":null,"colour":195,"tooltip":"Find a child by name (FindFirstChild).","helpUrl":""},
    {"type":"roblox_wait_for_child","message0":"%1 \u25B8 wait for child %2",
     "args0":[{"type":"input_value","name":"PARENT"},{"type":"input_value","name":"NAME"}],
     "inputsInline":true,"output":null,"colour":195,"tooltip":"Wait until a named child exists, then return it.","helpUrl":""},
    {"type":"roblox_clone","message0":"clone %1","args0":[{"type":"input_value","name":"OBJECT"}],
     "inputsInline":true,"output":null,"colour":195,"tooltip":"Make a copy of an object.","helpUrl":""},
    {"type":"roblox_set_parent","message0":"put %1 inside %2",
     "args0":[{"type":"input_value","name":"CHILD"},{"type":"input_value","name":"PARENT"}],
     "inputsInline":true,"previousStatement":null,"nextStatement":null,"colour":195,"tooltip":"Set where an object lives (its Parent).","helpUrl":""},
    {"type":"roblox_destroy","message0":"destroy %1","args0":[{"type":"input_value","name":"OBJECT"}],
     "inputsInline":true,"previousStatement":null,"nextStatement":null,"colour":195,"tooltip":"Remove an object forever.","helpUrl":""},

    /* ---- Properties ---- */

  /* ============ Lua generators for custom blocks ============ */
  function wrapHandler(g, b, header, paramOpen){
    var br = g.statementToCode(b, 'DO');
    return header + paramOpen + '\n' + br + 'end)\n';
  }
  def('roblox_on_run', function(b,g){
    var br = g.statementToCode(b,'DO');
    var ind = g.INDENT || '  ';
    var re = new RegExp('^' + ind.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gm');
    br = br.replace(re,'');
    return '-- \u25B6 When the script runs\n' + br + '\n';
  });
  def('roblox_on_touched', function(b,g){
    return wrapHandler(g, b, V(g,b,'PART','script.Parent') + '.Touched:Connect(', 'function(otherPart)');
  });
  def('roblox_on_player_added', function(b,g){
    return wrapHandler(g, b, 'game.Players.PlayerAdded:Connect(', 'function(player)');
  });
  def('roblox_on_player_removing', function(b,g){
    return wrapHandler(g, b, 'game.Players.PlayerRemoving:Connect(', 'function(player)');
  });
  def('roblox_on_clicked', function(b,g){
    return wrapHandler(g, b, V(g,b,'DETECTOR','script.Parent') + '.MouseClick:Connect(', 'function(player)');
  });

  R('roblox_event_hit', function(){ return 'otherPart'; });
  R('roblox_event_player', function(){ return 'player'; });
  R('roblox_game', function(){ return 'game'; });
  R('roblox_workspace', function(){ return 'workspace'; });
  R('roblox_script', function(){ return 'script'; });
  R('roblox_get_service', function(b){ return 'game:GetService("' + F(b,'SERVICE') + '")'; });
  R('roblox_new_instance', function(b){ return 'Instance.new("' + F(b,'CLASS') + '")'; });
  R('roblox_find_child', function(b,g){ return V(g,b,'PARENT','workspace') + ':FindFirstChild(' + V(g,b,'NAME','""') + ')'; });
  R('roblox_wait_for_child', function(b,g){ return V(g,b,'PARENT','workspace') + ':WaitForChild(' + V(g,b,'NAME','""') + ')'; });
  R('roblox_clone', function(b,g){ return V(g,b,'OBJECT','script') + ':Clone()'; });
  R('roblox_get_property', function(b,g){ return V(g,b,'OBJECT','script') + '.' + F(b,'PROP'); });
  R('roblox_get_property_named', function(b,g){ return V(g,b,'OBJECT','script') + '.' + F(b,'NAME'); });
  R('roblox_vector3', function(b,g){ return 'Vector3.new(' + V(g,b,'X','0') + ', ' + V(g,b,'Y','0') + ', ' + V(g,b,'Z','0') + ')'; });
  R('roblox_color3_rgb', function(b,g){ return 'Color3.fromRGB(' + V(g,b,'R','0') + ', ' + V(g,b,'G','0') + ', ' + V(g,b,'B','0') + ')'; });
  R('roblox_cframe', function(b,g){ return 'CFrame.new(' + V(g,b,'X','0') + ', ' + V(g,b,'Y','0') + ', ' + V(g,b,'Z','0') + ')'; });
  R('roblox_brickcolor', function(b){ return 'BrickColor.new("' + F(b,'COLOR') + '")'; });
  R('roblox_enum', function(b){ return 'Enum.' + F(b,'CATEGORY') + '.' + F(b,'ITEM'); });
  R('roblox_all_players', function(){ return 'game.Players:GetPlayers()'; });
  R('roblox_player_from_part', function(b,g){ return 'game.Players:GetPlayerFromCharacter(' + V(g,b,'PART','otherPart') + '.Parent)'; });
  R('roblox_player_character', function(b,g){ return V(g,b,'PLAYER','player') + '.Character'; });
  R('roblox_humanoid_of', function(b,g){ return V(g,b,'MODEL','script.Parent') + ':FindFirstChildOfClass("Humanoid")'; });
  R('roblox_player_name', function(b,g){ return V(g,b,'PLAYER','player') + '.Name'; });
  R('roblox_call_method_return', function(b,g){ return V(g,b,'OBJECT','script') + ':' + F(b,'METHOD') + '(' + (g.valueToCode(b,'ARGS',Order.NONE)||'') + ')'; });
  R('roblox_raw_value', function(b){ return F(b,'CODE'); });

  S('roblox_set_parent', function(b,g){ return V(g,b,'CHILD','nil') + '.Parent = ' + V(g,b,'PARENT','workspace'); });
  S('roblox_destroy', function(b,g){ return V(g,b,'OBJECT','nil') + ':Destroy()'; });
  S('roblox_set_property', function(b,g){ return V(g,b,'OBJECT','script') + '.' + F(b,'PROP') + ' = ' + V(g,b,'VALUE','nil'); });
  S('roblox_set_property_named', function(b,g){ return V(g,b,'OBJECT','script') + '.' + F(b,'NAME') + ' = ' + V(g,b,'VALUE','nil'); });
  S('roblox_print', function(b,g){ return 'print(' + V(g,b,'VALUE','""') + ')'; });

  R('roblox_common_target', function(b){
    var map = { workspace:'workspace', game:'game', script:'script', parent:'script.Parent',
      player:'player', character:'player.Character', otherpart:'otherPart',
      touchplayer:'game.Players:GetPlayerFromCharacter(otherPart.Parent)' };
    return map[F(b,'WHICH')] || 'workspace';
  });
  S('roblox_move_to', function(b,g){ return V(g,b,'OBJECT','script.Parent') + ':PivotTo(CFrame.new(' + V(g,b,'X','0') + ', ' + V(g,b,'Y','0') + ', ' + V(g,b,'Z','0') + '))'; });
  S('roblox_teleport', function(b,g){ return V(g,b,'PLAYER','player') + '.Character:PivotTo(CFrame.new(' + V(g,b,'X','0') + ', ' + V(g,b,'Y','0') + ', ' + V(g,b,'Z','0') + '))'; });
  S('roblox_set_name', function(b,g){ return V(g,b,'OBJECT','script.Parent') + '.Name = ' + V(g,b,'NAME','""'); });
  S('roblox_paint', function(b,g){ return V(g,b,'OBJECT','script.Parent') + '.Color = ' + V(g,b,'COLOR','Color3.fromRGB(255, 255, 255)'); });
  S('roblox_anchor', function(b,g){ return V(g,b,'OBJECT','script.Parent') + '.Anchored = ' + F(b,'STATE'); });
  S('roblox_change_health', function(b,g){ var h = V(g,b,'HUMANOID','nil'); return h + '.Health = ' + h + '.Health + (' + V(g,b,'AMOUNT','0') + ')'; });
  S('roblox_kill', function(b,g){ return V(g,b,'HUMANOID','nil') + '.Health = 0'; });

      '<block type="roblox_teleport"><value name="PLAYER"><shadow type="roblox_event_player"></shadow></value><value name="X"><shadow type="math_number"><field name="NUM">0</field></shadow></value><value name="Y"><shadow type="math_number"><field name="NUM">50</field></shadow></value><value name="Z"><shadow type="math_number"><field name="NUM">0</field></shadow></value></block>' +
      '<block type="roblox_sound_play"></block>' +
      '<block type="roblox_sound_stop"></block>' +
      '<sep gap="10"></sep>' +
      '<block type="roblox_call_method"></block>' +
      '<block type="roblox_call_method_return"></block>' +
    '</category>' +
    '<sep></sep>' +
    '<category name="Variables" colour="330" custom="VARIABLE"></category>' +
    '<category name="Functions" colour="290" custom="PROCEDURE"></category>' +
    '<category name="Advanced" colour="#7C8AA0">' +
      '<block type="roblox_raw_statement"></block>' +
      '<block type="roblox_raw_value"></block>' +
    '</category>' +
  '</xml>';

  /* ============ Theme ============ */
  var theme = Blockly.Theme.defineTheme('blocksmith', {
    base: Blockly.Themes.Classic,
    componentStyles: {
      workspaceBackgroundColour: '#0F1828',
      toolboxBackgroundColour: '#0C1320',
      toolboxForegroundColour: '#cbd5e6',
      flyoutBackgroundColour: '#0C1320',
      flyoutForegroundColour: '#cbd5e6',
      flyoutOpacity: 1,
      scrollbarColour: '#2a3a55',
      scrollbarOpacity: 0.55,
      insertionMarkerColour: '#E8B04B',
      insertionMarkerOpacity: 0.55,
      selectedGlowColour: '#E8B04B',
      selectedGlowOpacity: 0.45,
      cursorColour: '#E8B04B',
      markerColour: '#E8B04B'
    },
    fontStyle: { family: '"Plus Jakarta Sans", system-ui, sans-serif', weight: '600', size: 11 }
  });

  /* ============ Inject ============ */
  var blocklyDiv = document.getElementById('blocklyDiv');
  var workspace = Blockly.inject(blocklyDiv, {
    toolbox: TOOLBOX,
    theme: theme,
    renderer: 'zelos',
    grid: { spacing: 30, length: 3, colour: '#1b2740', snap: true },
    zoom: { controls: true, wheel: true, startScale: 0.85, maxScale: 2.2, minScale: 0.4, scaleSpeed: 1.1, pinch: true },
    move: { scrollbars: true, drag: true, wheel: false },
    trashcan: true,
    sounds: false
  });

  /* ============ Starter example ============ */
  var STARTER_XML =
  '<xml xmlns="https://developers.google.com/blockly/xml">' +
    '<block type="roblox_on_touched" x="60" y="60">' +
      '<value name="PART"><block type="roblox_get_property"><value name="OBJECT"><block type="roblox_script"></block></value><field name="PROP">Parent</field></block></value>' +
      '<statement name="DO">' +
        '<block type="roblox_set_property">' +
          '<value name="OBJECT"><block type="roblox_event_hit"></block></value>' +
          '<field name="PROP">Color</field>' +
          '<value name="VALUE"><block type="roblox_color3_rgb"><value name="R"><shadow type="math_number"><field name="NUM">85</field></shadow></value><value name="G"><shadow type="math_number"><field name="NUM">170</field></shadow></value><value name="B"><shadow type="math_number"><field name="NUM">255</field></shadow></value></block></value>' +
          '<next><block type="roblox_print"><value name="VALUE"><shadow type="text"><field name="TEXT">Something touched me!</field></shadow></value></block></next>' +
        '</block>' +
      '</statement>' +
    '</block>' +
  '</xml>';

  var xmlText = (Blockly.utils && Blockly.utils.xml && Blockly.utils.xml.textToDom)
    ? Blockly.utils.xml.textToDom : Blockly.Xml.textToDom;

  function loadStarter(){
    var dom = xmlText(STARTER_XML);
    Blockly.Xml.domToWorkspace(dom, workspace);
  }

  /* ============ Code generation + syntax highlight ============ */
  var gutter = document.getElementById('gutter');
  var codeOut = document.getElementById('codeOut');
  var emptyEl = document.getElementById('empty');
  var lastCode = '';

  var KW = {};
  ['and','break','do','else','elseif','end','false','for','function','if','in','local','nil','not','or','repeat','return','then','true','until','while','continue']
    .forEach(function(w){ KW[w]=1; });
  var GLOB = {};
  ['game','workspace','script','Instance','Vector3','Color3','CFrame','BrickColor','Enum','task','wait','print','warn','pairs','ipairs','tostring','tonumber','math','string','table','typeof','Vector2','UDim2','UDim','Random','os','tick','spawn','delay']
    .forEach(function(w){ GLOB[w]=1; });

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var RX = /(--\[\[[\s\S]*?\]\]|--[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(\b\d+(?:\.\d+)?\b)|(\b[A-Za-z_]\w*\b)/g;
  function highlight(code){
    return esc(code).replace(RX, function(m, c, s, n, w){
      if (c) return '<span class="tok-c">' + c + '</span>';
      if (s) return '<span class="tok-s">' + s + '</span>';
      if (n) return '<span class="tok-n">' + n + '</span>';
      if (w){
        if (KW[w]) return '<span class="tok-k">' + w + '</span>';
        if (GLOB[w]) return '<span class="tok-g">' + w + '</span>';
        return w;
      }
      return m;
    });
  }

  function renderCode(code){
    var lines = code.length ? code.split('\n') : [];
    while (lines.length && lines[lines.length-1] === '') lines.pop();
    var nums = [];
    for (var i=0;i<lines.length;i++) nums.push(i+1);
    gutter.textContent = nums.join('\n');
    codeOut.innerHTML = lines.length ? highlight(lines.join('\n')) : '';
    emptyEl.style.display = lines.length ? 'none' : 'flex';
  }

  function generateCode(){
    var code = '';
    try { code = Blockly.Lua.workspaceToCode(workspace); } catch(e){ code = ''; }
    lastCode = code;
    renderCode(code);
  }

  /* ============ Persistence ============ */
  var saveTimer = null;
  function scheduleSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      try {
        if (window.storage && window.storage.set){
          var data = JSON.stringify(Blockly.serialization.workspaces.save(workspace));
          window.storage.set('blocksmith_save', data, false).catch(function(){});
        }
      } catch(e){}
    }, 800);
  }

  function boot(){
    var done = function(loaded){
      if (!loaded){ try { loadStarter(); } catch(e){} }
      generateCode();
    };
    try {
      if (window.storage && window.storage.get){
        window.storage.get('blocksmith_save', false).then(function(r){
          if (r && r.value){
            try { Blockly.serialization.workspaces.load(JSON.parse(r.value), workspace); done(true); }
            catch(e){ done(false); }
          } else { done(false); }
        }).catch(function(){ done(false); });
        return;
      }
    } catch(e){}
    done(false);
  }

  workspace.addChangeListener(function(e){
    if (e.isUiEvent) return;
    generateCode();
    if (e.type !== Blockly.Events.FINISHED_LOADING) scheduleSave();
  });

  /* ============ UI helpers ============ */
  var toastTimer = null;
  function toast(msg){
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
  }
  function openModal(opts){
    document.getElementById('modalTitle').textContent = opts.title;
    document.getElementById('modalBody').innerHTML = opts.body;
    var foot = document.getElementById('modalFoot'); foot.innerHTML = '';
    opts.actions.forEach(function(a){
      var b = document.createElement('button');
      b.className = 'btn ' + (a.kind==='primary'?'btn-primary':a.kind==='danger'?'btn-danger':'btn-ghost');
      b.textContent = a.label; b.onclick = a.onClick; foot.appendChild(b);
    });
    document.getElementById('modal').classList.add('show');
  }
  function closeModal(){ document.getElementById('modal').classList.remove('show'); }
  document.getElementById('modal').addEventListener('click', function(e){ if (e.target.id === 'modal') closeModal(); });

  function downloadText(name, text, mime){
    try {
      var blob = new Blob([text], { type: mime });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 120);
    } catch(e){ toast('Download not available here — use Copy Lua instead'); }
  }

  function copyLua(){
    var t = (lastCode || '').trim();
    if (!t){ toast('Add some blocks first'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){ toast('Lua copied \u2713'); }).catch(fallback);
    } else { fallback(); }
    function fallback(){
      var ta = document.createElement('textarea'); ta.value = t;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); toast('Lua copied \u2713'); }
      catch(_){ toast('Copy failed — select the code manually'); }
      document.body.removeChild(ta);
    }
  }

  /* ============ Wire buttons ============ */
  document.getElementById('copyBtn').onclick = copyLua;
  document.getElementById('copyBtn2').onclick = copyLua;
  document.getElementById('dlBtn').onclick = function(){
    var t = (lastCode||'').trim();
    if (!t){ toast('Nothing to download yet'); return; }
    downloadText('roblox-script.lua', t, 'text/plain');
  };
  document.getElementById('saveBtn').onclick = function(){
    try {
      var data = JSON.stringify(Blockly.serialization.workspaces.save(workspace), null, 2);
      downloadText('blocksmith-project.json', data, 'application/json');
      toast('Project saved');
    } catch(e){ toast('Save failed'); }
  };
  var fileInput = document.getElementById('fileInput');
  document.getElementById('openBtn').onclick = function(){ fileInput.click(); };
  fileInput.onchange = function(e){
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(){
      try {
        var json = JSON.parse(r.result);
        workspace.clear();
        Blockly.serialization.workspaces.load(json, workspace);
        generateCode(); toast('Project opened');
      } catch(err){ toast("Couldn't open that file"); }
      fileInput.value = '';
    };
    r.readAsText(f);
  };
  document.getElementById('newBtn').onclick = function(){
    openModal({
      title:'Start over?',
      body:'<p>This clears every block on the canvas and drops in the starter example. You can\u2019t undo a clear once this closes.</p>',
      actions:[
        { label:'Cancel', kind:'ghost', onClick:closeModal },
        { label:'Clear everything', kind:'danger', onClick:function(){ workspace.clear(); loadStarter(); generateCode(); closeModal(); toast('Fresh canvas'); } }
      ]
    });
  };
  var HELP_HTML =
    '<p>Build your script by snapping blocks on the left. The matching <b>Roblox Lua</b> shows on the right \u2014 that\u2019s the real code your game runs.</p>' +
    '<ol>' +
      '<li>Click <b>Copy Lua</b> (top-right).</li>' +
      '<li>Open <b>Roblox Studio</b>. In the <b>Explorer</b> panel, hover <b>ServerScriptService</b>, click the <b>+</b>, and add a <b>Script</b>.</li>' +
      '<li>Select the new Script, delete the default line, and paste your code.</li>' +
      '<li>Press <b>Play</b> to test. Open <b>View \u25B8 Output</b> to see your <i>print</i> messages.</li>' +
    '</ol>' +
    '<p class="tip"><b>Tip:</b> \u201Cwhen \u2026 is touched\u201D needs a Part \u2014 put your Script <i>inside</i> a Part, or plug a part into the block. For things only one player should see (GUI, camera), use a <b>LocalScript</b> in <b>StarterPlayer \u25B8 StarterPlayerScripts</b> instead.</p>';
  document.getElementById('helpBtn').onclick = function(){
    openModal({ title:'How to use your script in Roblox', body:HELP_HTML, actions:[{ label:'Got it', kind:'primary', onClick:closeModal }] });
  };

  /* mobile code panel toggle */
  var main = document.getElementById('main');
  document.getElementById('toggleCode').onclick = function(){ main.classList.add('show-code'); };
  document.getElementById('closeCode').onclick = function(){ main.classList.remove('show-code'); };
  function syncCloseBtn(){
    document.getElementById('closeCode').style.display = (window.innerWidth <= 880) ? 'inline-flex' : 'none';
  }
  syncCloseBtn();

  /* resize handling */
  function doResize(){ Blockly.svgResize(workspace); syncCloseBtn(); }
  window.addEventListener('resize', doResize);
  setTimeout(doResize, 50);

  /* go */
  boot();
  }

  function showFatal(msg){
    var d = document.getElementById('blocklyDiv');
    if (d){ d.innerHTML = '<div class="fatal"><b>Couldn\u2019t start the editor.</b><br>' + msg + '</div>'; }
  }
  var __tries = 0;
  (function ready(){
    if (window.Blockly && window.Blockly.inject && window.Blockly.Lua && window.Blockly.Lua.forBlock){
      try { start(); }
      catch(e){ showFatal((e && e.message) ? e.message : String(e)); }
      return;
    }
    if (__tries++ > 120){
      showFatal('The block engine could not be loaded from the internet. Please check your connection and reload the page.');
      return;
    }
    setTimeout(ready, 50);
  })();
})();
</script>
</body>
</html>
