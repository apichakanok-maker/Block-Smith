<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Blocksmith — Roblox script builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Block engine. NOTE: the *minified* cdnjs builds are broken (invalid syntax), so we load the non-min files. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blockly_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blocks_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/lua_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/msg/en.js"></script>

<style>
  :root{
    --ink:#0C1320; --ink-2:#0F1828; --surface:#131D31; --surface-2:#172339;
    --line:#243249; --line-2:#2d3d5a;
    --text:#E9EEF7; --muted:#93A1BC; --muted-2:#62718c;
    --gold:#E8B04B; --gold-bright:#F4C667; --gold-deep:#C8902F;
    --danger:#E2705B;
    --code-bg:#0A0F1A;
    --tok-k:#E8B04B; --tok-s:#86D69B; --tok-c:#586A85; --tok-n:#6FC9C0; --tok-g:#C5A6F2;
    --r:14px; --r-sm:10px;
    --shadow:0 18px 48px rgba(0,0,0,.45);
    --hdr:60px;
    --display:"Fraunces", Georgia, "Times New Roman", serif;
    --ui:"Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(232,176,75,.08), transparent 60%),
      var(--ink);
    color:var(--text); font-family:var(--ui);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    height:var(--hdr); flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:0 16px; background:rgba(14,21,37,.86); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); z-index:30; position:relative;
  }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; }
  .logo-mark{ width:30px; height:30px; flex:0 0 auto; filter:drop-shadow(0 3px 6px rgba(232,176,75,.25)); }
  .brand-text{ display:flex; flex-direction:column; line-height:1; min-width:0; }
  .brand-name{ font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:.2px; }
  .brand-name b{ color:var(--gold); font-weight:600; }
  .brand-sub{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2); margin-top:3px; white-space:nowrap; }

  .actions{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .btn{
    font-family:var(--ui); font-weight:600; font-size:13px; cursor:pointer;
    border-radius:var(--r-sm); padding:9px 13px; border:1px solid var(--line-2);
    background:var(--surface); color:var(--text); transition:.16s ease; white-space:nowrap;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{ border-color:var(--gold-deep); background:var(--surface-2); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn svg{ width:15px; height:15px; opacity:.85; }
  .btn-ghost{ background:transparent; }
  .btn-primary{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#241803;
    border-color:var(--gold-deep); font-weight:700; box-shadow:0 6px 16px rgba(232,176,75,.22);
  }
  .btn-primary:hover{ filter:brightness(1.05); border-color:var(--gold-deep); }
  .btn-danger{ background:transparent; color:var(--danger); border-color:#5a3a36; }
  .btn-danger:hover{ background:rgba(226,112,91,.12); border-color:var(--danger); }
  .btn-icon{ padding:8px; border-color:var(--line); background:transparent; }
  .lbl-sm{ display:inline; }

  /* ---------- Main split ---------- */
  #main{ flex:1 1 auto; display:flex; min-height:0; position:relative; }
  .blockly-wrap{ flex:1.7 1 0; position:relative; min-width:0; }
  #blocklyDiv{ position:absolute; inset:0; }

  .divider{ width:1px; flex:0 0 auto; background:linear-gradient(180deg, transparent, var(--line-2) 18%, var(--line-2) 82%, transparent); }

  .code-wrap{
    flex:1 1 0; min-width:340px; max-width:560px; display:flex; flex-direction:column;
    background:var(--ink-2); border-left:1px solid var(--line); position:relative;
  }
  .code-head{
    flex:0 0 auto; height:46px; display:flex; align-items:center; gap:10px; padding:0 12px 0 16px;
    border-bottom:1px solid var(--line); position:relative;
  }
  .code-head::before{ content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px; background:linear-gradient(180deg,var(--gold-bright),var(--gold-deep)); }
  .code-title{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .code-flow{ font-size:11px; color:var(--muted-2); letter-spacing:.04em; }
  .code-flow b{ color:var(--gold); font-weight:600; }
  .code-head .right{ margin-left:auto; display:flex; gap:6px; align-items:center; }

  .code-scroll{ flex:1 1 auto; overflow:auto; background:var(--code-bg); position:relative; }
  .code-inner{ display:flex; min-height:100%; min-width:max-content; }
  .gutter, .code{
    font-family:var(--mono); font-size:13px; line-height:1.62; font-variant-ligatures:none;
    padding-top:14px; padding-bottom:24px;
  }
  .gutter{
    position:sticky; left:0; z-index:2; flex:0 0 auto; text-align:right;
    padding-left:16px; padding-right:12px; color:var(--muted-2); user-select:none;
    background:var(--code-bg); border-right:1px solid #15203200; white-space:pre;
    box-shadow:1px 0 0 rgba(36,50,73,.6);
  }
  .code{ padding-left:18px; padding-right:24px; white-space:pre; color:#cfe; }
  .code code{ font:inherit; color:#D6E0F0; }
  .tok-k{ color:var(--tok-k); font-weight:600; }
  .tok-s{ color:var(--tok-s); }
  .tok-c{ color:var(--tok-c); font-style:italic; }
  .tok-n{ color:var(--tok-n); }
  .tok-g{ color:var(--tok-g); }

  .empty{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-align:center; padding:24px; color:var(--muted); pointer-events:none;
  }
  .empty .e-mark{ width:40px; height:40px; opacity:.5; }
  .empty p{ margin:0; font-size:13.5px; max-width:240px; line-height:1.5; }

  .fatal{ margin:24px; padding:20px 22px; color:#ffd9d2; background:rgba(226,112,91,.12);
    border:1px solid var(--danger); border-radius:12px; font-size:14px; line-height:1.55; max-width:440px; }
  .fatal b{ color:#fff; }

  /* mobile floating toggle */
  .fab{ display:none; }

  /* ---------- Modal ---------- */
  .modal{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:20px;
    background:rgba(6,10,18,.66); backdrop-filter:blur(4px); }
  .modal.show{ display:flex; animation:fade .18s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .dialog{ width:min(520px,100%); background:var(--surface); border:1px solid var(--line-2); border-radius:var(--r);
    box-shadow:var(--shadow); overflow:hidden; animation:pop .2s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop{ from{transform:translateY(10px) scale(.98); opacity:0} to{transform:none; opacity:1} }
  .dialog h2{ font-family:var(--display); font-weight:600; font-size:20px; margin:0; padding:20px 22px 6px; }
  .dialog .body{ padding:6px 22px 14px; color:#c9d4e6; font-size:14px; line-height:1.6; }
  .dialog .body p{ margin:10px 0; }
  .dialog .body b{ color:var(--text); }
  .dialog .body ol{ margin:10px 0; padding-left:20px; }
  .dialog .body li{ margin:7px 0; }
  .dialog .body .tip{ background:rgba(232,176,75,.08); border:1px solid rgba(232,176,75,.22); border-radius:10px; padding:11px 13px; font-size:13px; color:#d9e2f0; }
  .dialog .foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 22px 20px; border-top:1px solid var(--line); }

  /* ---- accent button (Tutorial) ---- */
  .btn-accent{ border-color:rgba(232,176,75,.5); color:var(--gold); }
  .btn-accent:hover{ background:rgba(232,176,75,.12); border-color:var(--gold); color:var(--gold-bright); }

  /* ---- wide modal (tutorial) ---- */
  .dialog.wide{ width:min(900px,100%); display:flex; flex-direction:column; max-height:88vh; }
  .dialog.wide .body{ overflow:auto; flex:1 1 auto; }
  .tut-tabs{ display:flex; flex-wrap:wrap; gap:7px; padding:8px 22px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:3; background:var(--surface); }
  .tut-tab{ font:inherit; font-size:12.5px; font-weight:600; letter-spacing:.2px; cursor:pointer; color:var(--muted);
    background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:999px; padding:6px 13px; transition:.15s ease; }
  .tut-tab:hover{ color:var(--text); border-color:var(--line-2); }
  .tut-tab.on{ color:#241803; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border-color:var(--gold-deep); }
  .tut-page{ display:none; }
  .tut-page.on{ display:block; animation:fade .2s ease; }
  .tut-page h3{ font-family:var(--display); font-weight:600; font-size:16.5px; color:var(--text); margin:16px 0 6px; }
  .tut-page h3:first-child{ margin-top:4px; }
  .tut-page p{ margin:9px 0; }
  .tut-step{ display:flex; gap:11px; margin:10px 0; align-items:flex-start; }
  .tut-step .n{ flex:none; width:23px; height:23px; border-radius:50%; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .tut-step .tx{ flex:1; }
  .kbd{ background:var(--ink); border:1px solid var(--line-2); border-bottom-width:2px; border-radius:6px; padding:1px 6px; font-size:12px; font-family:var(--mono,monospace); color:#dbe6f5; }

  /* ---- explorer tree visual ---- */
  .xtree{ background:var(--ink); border:1px solid var(--line-2); border-radius:12px; padding:11px 13px; margin:12px 0; }
  .xrow{ display:flex; align-items:flex-start; gap:9px; padding:5px 0; font-size:13px; }
  .xrow + .xrow{ border-top:1px dashed rgba(255,255,255,.05); }
  .xrow .ic{ flex:none; width:18px; text-align:center; margin-top:1px; }
  .xrow .meta{ flex:1; }
  .xrow .nm{ color:#e3ecf8; font-weight:700; }
  .xrow .pill{ font-size:10px; font-weight:800; padding:1px 6px; border-radius:999px; margin-left:7px; vertical-align:middle; letter-spacing:.3px; }
  .pill.srv{ background:rgba(120,160,255,.16); color:#a9c2ff; }
  .pill.cli{ background:rgba(120,230,180,.16); color:#88e7b6; }
  .pill.both{ background:rgba(232,176,75,.16); color:var(--gold-bright); }
  .xrow .ds{ color:#90a0b8; font-size:12.5px; margin-top:2px; line-height:1.45; }

  /* ---- compare table ---- */
  .cmp{ width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
  .cmp th, .cmp td{ border:1px solid var(--line-2); padding:8px 11px; text-align:left; vertical-align:top; }
  .cmp th{ background:rgba(255,255,255,.04); color:var(--text); font-weight:600; }
  .cmp td{ color:#c4d0e2; }
  .cmp td b{ color:var(--text); }

  /* ---- category guide grid ---- */
  .catlist{ display:grid; grid-template-columns:1fr 1fr; gap:5px 18px; margin:10px 0; }
  .catlist div{ font-size:13px; color:#bcc8da; padding:3px 0; line-height:1.4; }
  .catlist b{ color:var(--text); }
  @media(max-width:640px){ .catlist{ grid-template-columns:1fr; } }

  /* ---- check results ---- */
  .chk-status{ display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:12px; margin:4px 0 16px; font-size:15px; font-weight:700; }
  .chk-status .em{ font-size:26px; line-height:1; }
  .chk-status.ok{ background:rgba(120,230,180,.10); border:1px solid rgba(120,230,180,.32); color:#bff0d6; }
  .chk-status.warn{ background:rgba(232,176,75,.10); border:1px solid rgba(232,176,75,.32); color:#f1deb4; }
  .chk-status.err{ background:rgba(255,120,120,.10); border:1px solid rgba(255,120,120,.34); color:#f4c8c8; }
  .chk-item{ display:flex; gap:11px; padding:11px 13px; border-radius:10px; margin:8px 0; background:rgba(255,255,255,.03);
    border:1px solid var(--line); font-size:13.5px; line-height:1.55; color:#cdd8e8; }
  .chk-item .em{ flex:none; font-size:16px; margin-top:1px; }
  .chk-item b{ color:var(--text); }
  .chk-place{ margin-top:16px; background:rgba(232,176,75,.07); border:1px solid rgba(232,176,75,.26); border-radius:12px; padding:14px 16px; }
  .chk-place .hd{ font-weight:800; color:var(--gold); font-size:11px; letter-spacing:.6px; text-transform:uppercase; margin-bottom:7px; }
  .chk-place .pl{ font-size:15.5px; color:var(--text); font-weight:700; margin-bottom:4px; }
  .chk-place .pl b{ color:var(--gold-bright); }
  .chk-place .wy{ font-size:13px; color:#c0ccdd; line-height:1.5; }

  /* ---------- Toast ---------- */
  #toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--line-2); color:var(--text);
    padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:.22s ease; z-index:80; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* Blockly dark polish */
  .blocklyToolboxDiv{ border-right:1px solid var(--line); }
  .blocklyFlyout{ z-index:5; }
  .blocklyMainBackground{ stroke:none; }
  .blocklyZoom image, .blocklyZoom>svg{ opacity:.85; }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px){
    :root{ --hdr:auto; }
    header{ flex-wrap:wrap; padding:10px 12px; gap:10px; }
    .actions{ width:100%; }
    .lbl-sm{ display:none; }
    .btn{ padding:9px 11px; }
    .code-wrap{
      position:fixed; left:0; right:0; top:0; bottom:0; max-width:none; z-index:40;
      transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1); border-left:none;
    }
    #main.show-code .code-wrap{ transform:translateY(0); }
    .divider{ display:none; }
    .fab{
      display:inline-flex; position:fixed; right:16px; bottom:18px; z-index:35;
      align-items:center; gap:8px; padding:13px 18px; border-radius:999px;
      background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803;
      border:none; font-weight:700; font-size:14px; font-family:var(--ui);
      box-shadow:0 10px 26px rgba(0,0,0,.4); cursor:pointer;
    }
  }
</style>
</head>
<body>

  <header>
    <div class="brand">
      <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="4" y="5" width="16.5" height="9.5" rx="3.2" fill="var(--gold)"/>
        <rect x="11.5" y="16.5" width="16.5" height="9.5" rx="3.2" fill="var(--gold-deep)"/>
      </svg>
      <div class="brand-text">
        <div class="brand-name">Block<b>smith</b></div>
        <div class="brand-sub">Roblox script builder</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" id="newBtn" title="Clear the canvas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <span class="lbl-sm">New</span>
      </button>
      <button class="btn btn-ghost" id="openBtn" title="Open a saved project (.json)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H3z"/></svg>
        <span class="lbl-sm">Open</span>
      </button>
      <button class="btn btn-ghost" id="saveBtn" title="Save your project to a file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        <span class="lbl-sm">Save</span>
      </button>
      <button class="btn btn-ghost" id="helpBtn" title="How to use this in Roblox">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.6 2.2c-.8.4-1.1.9-1.1 1.8"/><path d="M12 17h.01"/></svg>
        <span class="lbl-sm">Help</span>
      </button>
      <button class="btn btn-ghost" id="checkBtn" title="Check your script for mistakes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M12 3a9 9 0 1 0 9 9"/></svg>
        <span class="lbl-sm">Check</span>
      </button>
      <button class="btn btn-ghost btn-accent" id="tutorialBtn" title="Open the step-by-step tutorial">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5A2.5 2.5 0 0 1 4.5 4H11v15H4.5A2.5 2.5 0 0 0 2 21.5z"/><path d="M22 6.5A2.5 2.5 0 0 0 19.5 4H13v15h6.5a2.5 2.5 0 0 1 2.5 2.5z"/></svg>
        <span class="lbl-sm">Tutorial</span>
      </button>
      <button class="btn btn-primary" id="copyBtn" title="Copy the Lua code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
        Copy Lua
      </button>
    </div>
  </header>

  <div id="main">
    <div class="blockly-wrap">
      <div id="blocklyDiv"></div>
    </div>

    <div class="divider"></div>

    <aside class="code-wrap">
      <div class="code-head">
        <span class="code-title">Lua</span>
        <span class="code-flow">blocks <b>&rarr;</b> code</span>
        <div class="right">
          <button class="btn btn-icon" id="copyBtn2" title="Copy Lua">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
          </button>
          <button class="btn btn-icon" id="dlBtn" title="Download .lua file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M5 21h14"/></svg>
          </button>
          <button class="btn btn-icon" id="closeCode" title="Back to blocks" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
      </div>
      <div class="code-scroll">
        <div class="code-inner">
          <div class="gutter" id="gutter"></div>
          <pre class="code"><code id="codeOut"></code></pre>
        </div>
        <div class="empty" id="empty">
          <svg class="e-mark" viewBox="0 0 32 32"><rect x="4" y="5" width="16.5" height="9.5" rx="3.2" fill="var(--muted)"/><rect x="11.5" y="16.5" width="16.5" height="9.5" rx="3.2" fill="var(--muted-2)"/></svg>
          <p>Snap blocks together on the left and your Roblox Lua appears here.</p>
        </div>
      </div>
    </aside>
  </div>

  <button class="fab" id="toggleCode">
    <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l-3 3 3 3M16 9l3 3-3 3"/></svg>
    See Lua
  </button>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="dialog">
      <h2 id="modalTitle"></h2>
      <div class="body" id="modalBody"></div>
      <div class="foot" id="modalFoot"></div>
    </div>
  </div>

  <div id="toast"></div>

  <input type="file" id="fileInput" accept=".json,application/json" hidden />

<script id="app">
(function(){
  function start(){
  /* ============ Generator + Order setup (handles Blockly v12 API) ============ */
  var G = Blockly.Lua;
  var Order = (window.lua && window.lua.Order) ? window.lua.Order : {

  /* ============ Lua generators for custom blocks ============ */
  function wrapHandler(g, b, header, paramOpen){
    var br = g.statementToCode(b, 'DO');
    return header + paramOpen + '\n' + br + 'end)\n';
  }
  function reindent(g, code){ // add one extra indent level to an already-indented block
    return code.replace(/^(?=.)/gm, g.INDENT);
  }

  /* Events */
  def('roblox_on_run', function(b,g){
    var br = g.statementToCode(b,'DO');
    var ind = g.INDENT || '  ';
    var re = new RegExp('^' + ind.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gm');
    br = br.replace(re,'');
    return '-- \u25B6 When the script runs\n' + br + '\n';
  });
  def('roblox_on_touched', function(b,g){ return wrapHandler(g, b, V(g,b,'PART','script.Parent') + '.Touched:Connect(', 'function(otherPart)'); });
  def('roblox_on_touch_ended', function(b,g){ return wrapHandler(g, b, V(g,b,'PART','script.Parent') + '.TouchEnded:Connect(', 'function(otherPart)'); });
  def('roblox_on_clicked', function(b,g){ return wrapHandler(g, b, V(g,b,'DETECTOR','script.Parent') + '.MouseClick:Connect(', 'function(player)'); });
  def('roblox_on_prompt', function(b,g){ return wrapHandler(g, b, V(g,b,'PROMPT','script.Parent') + '.Triggered:Connect(', 'function(player)'); });
  def('roblox_on_player_added', function(b,g){ return wrapHandler(g, b, 'game.Players.PlayerAdded:Connect(', 'function(player)'); });
  def('roblox_on_player_removing', function(b,g){ return wrapHandler(g, b, 'game.Players.PlayerRemoving:Connect(', 'function(player)'); });
  def('roblox_on_character_added', function(b,g){ return wrapHandler(g, b, V(g,b,'PLAYER','player') + '.CharacterAdded:Connect(', 'function(character)'); });
  def('roblox_on_died', function(b,g){ return wrapHandler(g, b, V(g,b,'HUMANOID','nil') + '.Died:Connect(', 'function()'); });
  def('roblox_on_heartbeat', function(b,g){ return wrapHandler(g, b, 'game:GetService("RunService").Heartbeat:Connect(', 'function(dt)'); });
  def('roblox_on_remote_server', function(b,g){ return wrapHandler(g, b, V(g,b,'REMOTE','nil') + '.OnServerEvent:Connect(', 'function(player, value)'); });
  def('roblox_on_remote_client', function(b,g){ return wrapHandler(g, b, V(g,b,'REMOTE','nil') + '.OnClientEvent:Connect(', 'function(value)'); });
  def('roblox_on_key', function(b,g){
    var br = g.statementToCode(b,'DO');
    return 'game:GetService("UserInputService").InputBegan:Connect(function(input)\n' +
      g.INDENT + 'if input.KeyCode ~= Enum.KeyCode.' + F(b,'KEY') + ' then return end\n' +
      br + 'end)\n';
  });

      '  stat.Name = ' + V(g,b,'NAME','""') + '\n' +

  /* ============ Code generation + syntax highlight ============ */
  var gutter = document.getElementById('gutter');

  var KW = {};
  ['and','break','do','else','elseif','end','false','for','function','if','in','local','nil','not','or','repeat','return','then','true','until','while','continue']
    .forEach(function(w){ KW[w]=1; });
  var GLOB = {};
  ['game','workspace','script','Instance','Vector3','Color3','CFrame','BrickColor','Enum','task','wait','print','warn','pairs','ipairs','tostring','tonumber','math','string','table','typeof','Vector2','UDim2','UDim','Random','os','tick','spawn','delay']
    .forEach(function(w){ GLOB[w]=1; });

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var RX = /(--\[\[[\s\S]*?\]\]|--[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(\b\d+(?:\.\d+)?\b)|(\b[A-Za-z_]\w*\b)/g;
  function highlight(code){
    return esc(code).replace(RX, function(m, c, s, n, w){
      if (c) return '<span class="tok-c">' + c + '</span>';
      if (s) return '<span class="tok-s">' + s + '</span>';
      if (n) return '<span class="tok-n">' + n + '</span>';
      if (w){
        if (KW[w]) return '<span class="tok-k">' + w + '</span>';
        if (GLOB[w]) return '<span class="tok-g">' + w + '</span>';
        return w;
      }
      return m;
    });
  }

  function renderCode(code){
    var lines = code.length ? code.split('\n') : [];
    while (lines.length && lines[lines.length-1] === '') lines.pop();
    var nums = [];
    for (var i=0;i<lines.length;i++) nums.push(i+1);
    gutter.textContent = nums.join('\n');
    codeOut.innerHTML = lines.length ? highlight(lines.join('\n')) : '';
    emptyEl.style.display = lines.length ? 'none' : 'flex';
  }

  function generateCode(){
    var code = '';
    try { code = Blockly.Lua.workspaceToCode(workspace); } catch(e){ code = ''; }
    lastCode = code;
    renderCode(code);

  /* ============ Persistence ============ */
  var saveTimer = null;
  function scheduleSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      try {
        if (window.storage && window.storage.set){
          var data = JSON.stringify(Blockly.serialization.workspaces.save(workspace));
          window.storage.set('blocksmith_save', data, false).catch(function(){});
        }
      } catch(e){}
    }, 800);
  }

  function boot(){
    var done = function(loaded){
      if (!loaded){ try { loadStarter(); } catch(e){} }
      generateCode();
    };
    try {
      if (window.storage && window.storage.get){
        window.storage.get('blocksmith_save', false).then(function(r){
          if (r && r.value){
            try { Blockly.serialization.workspaces.load(JSON.parse(r.value), workspace); done(true); }
            catch(e){ done(false); }
          } else { done(false); }
        }).catch(function(){ done(false); });
        return;
      }
    } catch(e){}
    done(false);
  }

  workspace.addChangeListener(function(e){
    if (e.isUiEvent) return;
    generateCode();
    if (e.type !== Blockly.Events.FINISHED_LOADING) scheduleSave();

  function openModal(opts){

    if (dlg) dlg.classList.toggle('wide', !!opts.wide);
    var foot = document.getElementById('modalFoot'); foot.innerHTML = '';
    (opts.actions||[]).forEach(function(a){
      var b = document.createElement('button');
      b.className = 'btn ' + (a.kind==='primary'?'btn-primary':a.kind==='danger'?'btn-danger':'btn-ghost');
      b.textContent = a.label; b.onclick = a.onClick; foot.appendChild(b);
    });
    document.getElementById('modal').classList.add('show');
    if (typeof opts.onShow === 'function') opts.onShow();
  }
  function closeModal(){ document.getElementById('modal').classList.remove('show'); }
  document.getElementById('modal').addEventListener('click', function(e){ if (e.target.id === 'modal') closeModal(); });

  function downloadText(name, text, mime){
    try {
      var blob = new Blob([text], { type: mime });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = name;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 120);
    } catch(e){ toast('Download not available here — use Copy Lua instead'); }
  }

  function copyLua(){
    var t = (lastCode || '').trim();
    if (!t){ toast('Add some blocks first'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){ toast('Lua copied \u2713'); }).catch(fallback);
    } else { fallback(); }
    function fallback(){
      var ta = document.createElement('textarea'); ta.value = t;
      ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); toast('Lua copied \u2713'); }
      catch(_){ toast('Copy failed — select the code manually'); }
      document.body.removeChild(ta);
    }
  }

  /* ============ Wire buttons ============ */
  document.getElementById('copyBtn').onclick = copyLua;
  document.getElementById('copyBtn2').onclick = copyLua;
  document.getElementById('dlBtn').onclick = function(){
    var t = (lastCode||'').trim();
    if (!t){ toast('Nothing to download yet'); return; }
    downloadText('roblox-script.lua', t, 'text/plain');
  };
  document.getElementById('saveBtn').onclick = function(){
    try {
      var data = JSON.stringify(Blockly.serialization.workspaces.save(workspace), null, 2);
      downloadText('blocksmith-project.json', data, 'application/json');
      toast('Project saved');
    } catch(e){ toast('Save failed'); }
  };
  var fileInput = document.getElementById('fileInput');
  document.getElementById('openBtn').onclick = function(){ fileInput.click(); };
  fileInput.onchange = function(e){
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(){
      try {
        var json = JSON.parse(r.result);
        workspace.clear();
        Blockly.serialization.workspaces.load(json, workspace);
        generateCode(); toast('Project opened');
      } catch(err){ toast("Couldn't open that file"); }
      fileInput.value = '';
    };
    r.readAsText(f);
  };
  document.getElementById('newBtn').onclick = function(){
    openModal({
      title:'Start over?',
      body:'<p>This clears every block on the canvas and drops in the starter example. You can\u2019t undo a clear once this closes.</p>',
      actions:[
        { label:'Cancel', kind:'ghost', onClick:closeModal },
        { label:'Clear everything', kind:'danger', onClick:function(){ workspace.clear(); loadStarter(); generateCode(); closeModal(); toast('Fresh canvas'); } }
      ]
    });
  };
  var HELP_HTML =
    '<p>Build your script by snapping blocks on the left. The matching <b>Roblox Lua</b> shows on the right \u2014 that\u2019s the real code your game runs.</p>' +
    '<ol>' +
      '<li>Click <b>Copy Lua</b> (top-right).</li>' +
      '<li>Open <b>Roblox Studio</b>. In the <b>Explorer</b> panel, hover <b>ServerScriptService</b>, click the <b>+</b>, and add a <b>Script</b>.</li>' +
      '<li>Select the new Script, delete the default line, and paste your code.</li>' +
      '<li>Press <b>Play</b> to test. Open <b>View \u25B8 Output</b> to see your <i>print</i> messages.</li>' +
    '</ol>' +
    '<p class="tip"><b>Tip:</b> \u201Cwhen \u2026 is touched\u201D needs a Part \u2014 put your Script <i>inside</i> a Part, or plug a part into the block. For things only one player should see (GUI, camera), use a <b>LocalScript</b> in <b>StarterPlayer \u25B8 StarterPlayerScripts</b> instead.</p>';
  document.getElementById('helpBtn').onclick = function(){
    openModal({ title:'How to use your script in Roblox', body:HELP_HTML, actions:[{ label:'Got it', kind:'primary', onClick:closeModal }] });
  };

  /* ===================================================================
     CHECK button — finds mistakes and recommends where to put the script
     =================================================================== */
  var INPUT_VALUE   = (Blockly.ConnectionType && Blockly.ConnectionType.INPUT_VALUE) || 1;
  var CLIENT_BLOCKS = ['roblox_local_player','roblox_on_key','roblox_on_remote_client','roblox_fire_to_server'];
  var SERVER_BLOCKS = ['roblox_get_datastore','roblox_datastore_save','roblox_datastore_load','roblox_on_remote_server',
                       'roblox_make_leaderstat','roblox_change_stat','roblox_get_stat','roblox_fire_to_client','roblox_fire_all_clients'];
  var EVENT_BLOCKS  = ['roblox_on_run','roblox_on_touched','roblox_on_touch_ended','roblox_on_clicked','roblox_on_prompt',
                       'roblox_on_player_added','roblox_on_player_removing','roblox_on_character_added','roblox_on_died',
                       'roblox_on_key','roblox_on_heartbeat','roblox_on_remote_server','roblox_on_remote_client',
                       'procedures_defnoreturn','procedures_defreturn'];

  function runCheck(){
    var all  = workspace.getAllBlocks(false);
    var tops = workspace.getTopBlocks(false);
    if (!tops.length){
      openModal({ title:'Check your script',
        body:`<div class="chk-status warn"><span class="em">🧩</span><span>Your canvas is empty</span></div>
              <p>Drag a block from a category on the left to begin. A great first block is <b>“when the script runs”</b> from <b>Events</b>.</p>`,
        actions:[{ label:'OK', kind:'primary', onClick:closeModal }] });
      return;
    }
    var items = [];

    // 1) empty value slots → nil
    var empties = 0;
    all.forEach(function(b){
      (b.inputList||[]).forEach(function(inp){
        if (inp.connection && inp.connection.type === INPUT_VALUE){
          if (inp.connection.targetBlock() || inp.connection.getShadowDom()) return;
          if ((b.type==='roblox_call_method'||b.type==='roblox_call_method_return') && inp.name==='ARGS') return;
          if (b.type==='procedures_defreturn' && inp.name==='RETURN') return;
          empties++;
        }
      });
    });
    if (empties) items.push({lvl:'warn', em:'⚠️',
      html:`<b>${empties} empty slot${empties>1?'s':''}.</b> An empty hole becomes <span class="kbd">nil</span> and usually crashes the script. Click each empty bubble and type a value, or drop a block in. This also catches an empty <b>if … then</b> test — for example <span class="kbd">if score &gt; 1</span> with a missing side.`});

    // 2) loose stacks not inside an event
    var orphans = 0;
    tops.forEach(function(b){
      if (b.outputConnection) return;                 // floating value block, harmless
      if (EVENT_BLOCKS.indexOf(b.type) >= 0) return;
      orphans++;
    });
    if (orphans) items.push({lvl:'warn', em:'🔌',
      html:`<b>${orphans} loose block stack${orphans>1?'s':''}.</b> Blocks that aren’t inside a <b>“when …”</b> event (or <b>“when the script runs”</b>) will never run. Snap them under an event from the <b>Events</b> category.`});

    // 3) server + client mix
    var usesClient = all.some(function(b){ return CLIENT_BLOCKS.indexOf(b.type) >= 0; });
    var usesServer = all.some(function(b){ return SERVER_BLOCKS.indexOf(b.type) >= 0; });
    if (usesClient && usesServer) items.push({lvl:'err', em:'❌',
      html:`<b>Server and player blocks are mixed.</b> Player-only blocks (the local player, key presses) can’t share a script with server-only blocks (DataStore, leaderstats, player joins). Split them into a <b>Script</b> on the server and a <b>LocalScript</b> on the player.`});

    // 4) raw-Lua reminder
    var raws = all.filter(function(b){ return b.type==='roblox_raw_statement'||b.type==='roblox_raw_value'; }).length;
    if (raws) items.push({lvl:'ok', em:'✏️',
      html:`You used ${raws} raw-Lua block${raws>1?'s':''} — those are typed by hand, so double-check the spelling. Blocksmith can’t check inside them.`});

    // placement recommendation
    var usesTouch = all.some(function(b){ return ['roblox_on_touched','roblox_on_touch_ended','roblox_on_clicked','roblox_on_prompt'].indexOf(b.type) >= 0; });
    var usesGui = all.some(function(b){
      if (b.type==='roblox_set_text') return true;
      if (b.type==='roblox_new_instance'){ return /Gui|Frame|TextLabel|TextButton|TextBox|ImageLabel|ImageButton/.test(b.getFieldValue('CLASS')||''); }
      return false;
    });
    var place;
    if (usesClient) place = {kind:'LocalScript', where:'StarterPlayer ▸ StarterPlayerScripts', why:'You use the local player or key presses, which only work on a player’s own device.'};
    else if (usesGui) place = {kind:'LocalScript', where:'StarterGui (inside your ScreenGui)', why:'You’re changing on-screen GUI, which lives on each player’s screen.'};
    else if (usesTouch && !usesServer) place = {kind:'Script', where:'inside the Part, in the Workspace', why:'You react to a part being touched or clicked, so the Script should sit inside that part.'};
    else if (usesServer) place = {kind:'Script', where:'ServerScriptService', why:'You use players, leaderstats, or DataStores — these run on the server.'};
    else place = {kind:'Script', where:'ServerScriptService', why:'A normal server Script is the safe default for most game logic.'};

    var hasErr  = items.some(function(i){ return i.lvl==='err'; });
    var hasWarn = items.some(function(i){ return i.lvl==='warn'; });
    var st = hasErr  ? {cls:'err',  em:'❌', tx:'Found something to fix'}
           : hasWarn ? {cls:'warn', em:'⚠️', tx:'Almost there — a couple of tips'}
           :           {cls:'ok',   em:'✅', tx:'No problems found — nice work!'};

    var body = `<div class="chk-status ${st.cls}"><span class="em">${st.em}</span><span>${st.tx}</span></div>`;
    if (items.length) items.forEach(function(i){ body += `<div class="chk-item"><span class="em">${i.em}</span><span>${i.html}</span></div>`; });
    else body += `<p>Every slot is filled and every block sits inside an event. You’re ready to copy it into Roblox Studio. 🎉</p>`;
    body += `<div class="chk-place"><div class="hd">Where to put this script</div>
             <div class="pl">Put a <b>${place.kind}</b> in <b>${place.where}</b></div>
             <div class="wy">${place.why} Want the full map of where things go? Open <b>Tutorial ▸ “Where to put scripts”</b>.</div></div>`;

    openModal({ title:'Check your script', body:body,
      actions:[{ label:'Copy Lua', kind:'ghost', onClick:function(){ var c=document.getElementById('copyBtn'); if(c) c.click(); } },
               { label:'Done', kind:'primary', onClick:closeModal }] });
  }
  var _checkBtn = document.getElementById('checkBtn'); if (_checkBtn) _checkBtn.onclick = runCheck;

  /* ===================================================================
     TUTORIAL button — friendly, tabbed walkthrough
     =================================================================== */
  function openTutorial(){
    var tabs = [
      ['how','How it works'], ['where','Where to put scripts'], ['paste','Paste into Studio'],
      ['first','Build your first thing'], ['cats','Block guide'], ['tips','Tips']
    ];
    var P = {};

    P.how = `
      <h3>What Blocksmith does</h3>
      <p>You snap blocks together like LEGO, and Blocksmith turns them into real <b>Roblox Lua</b> code (shown on the right). You copy that code into Roblox Studio and your game runs it — no typing code yourself.</p>
      <div class="tut-step"><span class="n">1</span><span class="tx"><b>Drag blocks</b> from the colourful categories on the left onto the canvas.</span></div>
      <div class="tut-step"><span class="n">2</span><span class="tx"><b>Fill the slots</b> — click a white bubble and type a number or a word.</span></div>
      <div class="tut-step"><span class="n">3</span><span class="tx"><b>Watch the code</b> build itself on the right. That is the real script.</span></div>
      <div class="tut-step"><span class="n">4</span><span class="tx"><b>Copy Lua</b>, then paste into Roblox Studio (the next tabs show exactly where).</span></div>
      <p class="tip"><b>Golden rule:</b> every block must sit inside an <b>event</b> such as <b>“when the script runs”</b> or <b>“when … is touched”</b>. Events are the start — they decide <i>when</i> your blocks run.</p>`;

    P.where = `
      <h3>The Explorer: where your script lives</h3>
      <p>In Roblox Studio the <b>Explorer</b> panel lists everything in your game. Where you place a script decides what it can do and who it runs for. These are the spots you’ll use:</p>
      <div class="xtree">
        <div class="xrow"><span class="ic">🌍</span><span class="meta"><span class="nm">Workspace</span><span class="pill srv">server</span><div class="ds">The 3D world you build in. Put a <b>Script inside a Part</b> here when that part should do something — a touch trap, a button, a coin, a door.</div></span></div>
        <div class="xrow"><span class="ic">🧠</span><span class="meta"><span class="nm">ServerScriptService</span><span class="pill srv">server</span><div class="ds">The game’s brain. <b>Most Scripts go here</b> — anything about players joining, leaderstats, saving data, or spawning things for everyone.</div></span></div>
        <div class="xrow"><span class="ic">🎮</span><span class="meta"><span class="nm">StarterPlayer ▸ StarterPlayerScripts</span><span class="pill cli">player</span><div class="ds">Runs on each player’s own device. Put a <b>LocalScript</b> here for key presses, the camera, or the local player.</div></span></div>
        <div class="xrow"><span class="ic">🖥️</span><span class="meta"><span class="nm">StarterGui</span><span class="pill cli">player</span><div class="ds">On-screen menus &amp; buttons. Put a <b>LocalScript</b> (inside a ScreenGui) here to control what’s on the player’s screen.</div></span></div>
        <div class="xrow"><span class="ic">📦</span><span class="meta"><span class="nm">ReplicatedStorage</span><span class="pill both">shared</span><div class="ds">A shared box both the server and players can see. Keep <b>RemoteEvents</b> and things both sides need in here.</div></span></div>
        <div class="xrow"><span class="ic">🔒</span><span class="meta"><span class="nm">ServerStorage</span><span class="pill srv">server</span><div class="ds">A hidden box only the server can see. Good for secret things players shouldn’t reach (item templates, saved data).</div></span></div>
        <div class="xrow"><span class="ic">🧍</span><span class="meta"><span class="nm">StarterCharacterScripts</span><span class="pill cli">player</span><div class="ds">Runs fresh on a player’s character every time they spawn. Use it for character abilities.</div></span></div>
      </div>
      <h3>Script vs LocalScript</h3>
      <table class="cmp">
        <tr><th></th><th>Script 🟦</th><th>LocalScript 🟩</th></tr>
        <tr><td><b>Runs on</b></td><td>The server — one shared brain</td><td>One player’s device</td></tr>
        <tr><td><b>Can see</b></td><td>Everyone and the whole game</td><td>That player, their screen &amp; input</td></tr>
        <tr><td><b>Use for</b></td><td>Leaderstats, saving data, world logic, anything affecting all players</td><td>Key presses, GUI, camera, sounds only that player hears</td></tr>
        <tr><td><b>Goes in</b></td><td>ServerScriptService, or inside a Part</td><td>StarterPlayerScripts or StarterGui</td></tr>
      </table>
      <p class="tip"><b>Not sure which one?</b> Click the <b>Check</b> button — it reads your blocks and tells you the exact place to put this script.</p>`;

    P.paste = `
      <h3>From Blocksmith into your game</h3>
      <div class="tut-step"><span class="n">1</span><span class="tx">Click <span class="kbd">Copy Lua</span> at the top-right of Blocksmith.</span></div>
      <div class="tut-step"><span class="n">2</span><span class="tx">Open <b>Roblox Studio</b> and find the <b>Explorer</b> panel (View ▸ Explorer if it’s hidden).</span></div>
      <div class="tut-step"><span class="n">3</span><span class="tx">Hover the right container (see the previous tab), click the <span class="kbd">+</span>, and add a <b>Script</b> — or a <b>LocalScript</b> for player/GUI code.</span></div>
      <div class="tut-step"><span class="n">4</span><span class="tx">Click the new script to open it, select the default <span class="kbd">print("Hello world!")</span> line, and delete it.</span></div>
      <div class="tut-step"><span class="n">5</span><span class="tx"><b>Paste</b> your copied code with <span class="kbd">Ctrl/Cmd + V</span>.</span></div>
      <div class="tut-step"><span class="n">6</span><span class="tx">Press <span class="kbd">Play</span> ▶ to test. Open <b>View ▸ Output</b> to read your <b>print</b> messages.</span></div>
      <p class="tip"><b>Keep your blocks safe:</b> use <b>Save</b> to download a <span class="kbd">.json</span> file, and <b>Open</b> to load it back another day.</p>`;

    P.first = `
      <h3>Make a part change colour when touched</h3>
      <p>A tiny project to feel the whole flow:</p>
      <div class="tut-step"><span class="n">1</span><span class="tx">Open <b>Events</b> → drag <b>“when [this part] is touched”</b> onto the canvas.</span></div>
      <div class="tut-step"><span class="n">2</span><span class="tx">Open <b>Properties</b> → drag <b>“paint [ ] color [ ]”</b> <i>inside</i> the touched block, so it snaps into the mouth.</span></div>
      <div class="tut-step"><span class="n">3</span><span class="tx">In the paint block set the target to <b>“the touching part”</b> and choose a colour.</span></div>
      <div class="tut-step"><span class="n">4</span><span class="tx">Look right — real Lua appeared. Click <b>Copy Lua</b>.</span></div>
      <div class="tut-step"><span class="n">5</span><span class="tx">In Studio add a <b>Part</b> to the Workspace, then add a <b>Script inside that Part</b>, and paste.</span></div>
      <div class="tut-step"><span class="n">6</span><span class="tx">Press Play and walk into the part — it changes colour! 🎉</span></div>
      <p class="tip">That exact example was on your canvas when you opened Blocksmith. Press <b>New</b> any time to bring it back.</p>`;

    P.cats = `
      <h3>What each category is for</h3>
      <div class="catlist">
        <div><b>Events</b> — the “start”: when touched, clicked, a player joins, a key is pressed.</div>
        <div><b>Logic</b> — if / else, and / or, comparisons (is x &gt; 1?).</div>
        <div><b>Loops</b> — repeat things, do something to every item, wait.</div>
        <div><b>Math</b> — numbers, + − × ÷, random, round, distance.</div>
        <div><b>Text</b> — words, join text, turn numbers into text.</div>
        <div><b>Lists</b> — collections of things (tables).</div>
        <div><b>Objects</b> — game, Workspace, find / create / destroy parts.</div>
        <div><b>Properties</b> — colour, size, name, material, anchored…</div>
        <div><b>Values</b> — positions, colours, asset IDs, enums.</div>
        <div><b>Physics</b> — velocity, push with force, move &amp; spin.</div>
        <div><b>Players</b> — the player, character, humanoid, health, leaderstats.</div>
        <div><b>Actions</b> — print, wait, spawn a part, move, teleport.</div>
        <div><b>Effects</b> — play sounds, tween (animate), explosions.</div>
        <div><b>Data &amp; Network</b> — RemoteEvents, save / load data, tags.</div>
        <div><b>Variables</b> — your own named values (score, speed…).</div>
        <div><b>Functions</b> — your own reusable blocks.</div>
        <div><b>Advanced</b> — raycasts, time, and raw Lua.</div>
      </div>
      <p class="tip">Hover any block to read a short tooltip that explains what it does.</p>`;

    P.tips = `
      <h3>Tips for great scripts</h3>
      <p>🔎 <b>Use the Check button</b> often — it catches empty slots and tells you where to place the script.</p>
      <p>🧩 <b>Fill every slot.</b> An empty hole becomes <span class="kbd">nil</span> and usually errors.</p>
      <p>🎯 <b>Every block needs an event.</b> Loose blocks outside a “when …” never run.</p>
      <p>🆔 <b>Sounds &amp; images use IDs.</b> Use the <b>asset id</b> block (or “play sound”) and paste the number from Roblox’s catalogue.</p>
      <p>🧱 <b>Build small, test often.</b> Add a few blocks, press Play, then add more.</p>
      <p>🟦🟩 <b>Server vs player:</b> if it affects ALL players → a Script in ServerScriptService. If it’s one player’s screen or keys → a LocalScript.</p>
      <p>💾 <b>Save your work</b> with the Save button so you can come back to it later.</p>`;

    var tabBar = '<div class="tut-tabs">' + tabs.map(function(t,i){ return `<button class="tut-tab${i?'':' on'}" data-tab="${t[0]}">${t[1]}</button>`; }).join('') + '</div>';
    var pages  = tabs.map(function(t,i){ return `<div class="tut-page${i?'':' on'}" data-page="${t[0]}">${P[t[0]]}</div>`; }).join('');

    openModal({
      title:'Blocksmith Tutorial', wide:true, body: tabBar + pages,
      actions:[{ label:'Close', kind:'primary', onClick:closeModal }],
      onShow:function(){
        var mb = document.getElementById('modalBody');
        var tabEls = mb.querySelectorAll('.tut-tab');
        tabEls.forEach(function(btn){
          btn.onclick = function(){
            var id = btn.getAttribute('data-tab');
            tabEls.forEach(function(x){ x.classList.toggle('on', x===btn); });
            mb.querySelectorAll('.tut-page').forEach(function(pg){ pg.classList.toggle('on', pg.getAttribute('data-page')===id); });
            mb.scrollTop = 0;
          };
        });
      }
    });
  }
  var _tutBtn = document.getElementById('tutorialBtn'); if (_tutBtn) _tutBtn.onclick = openTutorial;

  /* mobile code panel toggle */
  var main = document.getElementById('main');
  document.getElementById('toggleCode').onclick = function(){ main.classList.add('show-code'); };
  document.getElementById('closeCode').onclick = function(){ main.classList.remove('show-code'); };
  function syncCloseBtn(){
    document.getElementById('closeCode').style.display = (window.innerWidth <= 880) ? 'inline-flex' : 'none';
  }
  syncCloseBtn();

  /* resize handling */
  function doResize(){ Blockly.svgResize(workspace); syncCloseBtn(); }
  window.addEventListener('resize', doResize);
  setTimeout(doResize, 50);

  /* go */
  boot();
  }

  function showFatal(msg){
    var d = document.getElementById('blocklyDiv');
    if (d){ d.innerHTML = '<div class="fatal"><b>Couldn\u2019t start the editor.</b><br>' + msg + '</div>'; }
  }
  var __tries = 0;
  (function ready(){
    if (window.Blockly && window.Blockly.inject && window.Blockly.Lua && window.Blockly.Lua.forBlock){
      try { start(); }
      catch(e){ showFatal((e && e.message) ? e.message : String(e)); }
      return;
    }
    if (__tries++ > 120){
      showFatal('The block engine could not be loaded from the internet. Please check your connection and reload the page.');
      return;
    }
    setTimeout(ready, 50);
  })();
})();
</script>
</body>
</html>
