<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Blocksmith — Roblox script builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Block engine. NOTE: the *minified* cdnjs builds are broken (invalid syntax), so we load the non-min files. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blockly_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/blocks_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/lua_compressed.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/blockly/12.3.1/msg/en.js"></script>

<style>
  :root{
    --ink:#0C1320; --ink-2:#0F1828; --surface:#131D31; --surface-2:#172339;
    --line:#243249; --line-2:#2d3d5a;
    --text:#E9EEF7; --text-soft:#c9d4e6; --muted:#93A1BC; --muted-2:#62718c;
    --gold:#E8B04B; --gold-bright:#F4C667; --gold-deep:#C8902F;
    --danger:#E2705B;
    --code-bg:#0A0F1A; --code-text:#D6E0F0;
    --kbd-bg:#0C1320; --kbd-text:#dbe6f5;
    --hairline:rgba(255,255,255,.06); --chip-bg:rgba(255,255,255,.03);
    --hdr-bg:rgba(14,21,37,.86); --body-glow:rgba(232,176,75,.08);
    --tok-k:#E8B04B; --tok-s:#86D69B; --tok-c:#586A85; --tok-n:#6FC9C0; --tok-g:#C5A6F2;
    --grid:#1b2740;
    --r:14px; --r-sm:10px;
    --shadow:0 18px 48px rgba(0,0,0,.45);
    --hdr:60px;
    --display:"Fraunces", Georgia, "Times New Roman", serif;
    --ui:"Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  :root[data-theme="light"]{
    --ink:#E9EDF3; --ink-2:#F6F8FB; --surface:#FFFFFF; --surface-2:#EEF1F7;
    --line:#DCE1EA; --line-2:#C6CEDC;
    --text:#1A2433; --text-soft:#3C4759; --muted:#5C6678; --muted-2:#93A0B4;
    --gold:#E8B04B; --gold-bright:#F4C667; --gold-deep:#C8902F;
    --danger:#D9533B;
    --code-bg:#F6F8FB; --code-text:#26303F;
    --kbd-bg:#EAEEF4; --kbd-text:#2A3344;
    --hairline:rgba(20,30,50,.08); --chip-bg:rgba(20,30,50,.04);
    --hdr-bg:rgba(255,255,255,.9); --body-glow:rgba(232,176,75,.16);
    --tok-k:#B26A00; --tok-s:#1E7E34; --tok-c:#94A0B2; --tok-n:#0E8A8A; --tok-g:#7A4FBF;
    --grid:#D7DCE6;
    --shadow:0 18px 48px rgba(30,42,64,.16);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, var(--body-glow), transparent 60%),
      var(--ink);
    color:var(--text); font-family:var(--ui);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    height:var(--hdr); flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:0 16px; background:var(--hdr-bg); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line); z-index:30; position:relative;
  }
  .brand{ display:flex; align-items:center; gap:11px; min-width:0; }
  .logo-mark{ width:30px; height:30px; flex:0 0 auto; filter:drop-shadow(0 3px 6px rgba(232,176,75,.25)); }
  .brand-text{ display:flex; flex-direction:column; line-height:1; min-width:0; }
  .brand-name{ font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:.2px; }
  .brand-name b{ color:var(--gold); font-weight:600; }
  .brand-sub{ font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2); margin-top:3px; white-space:nowrap; }

  .actions{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
  .btn{
    font-family:var(--ui); font-weight:600; font-size:13px; cursor:pointer;
    border-radius:var(--r-sm); padding:9px 13px; border:1px solid var(--line-2);
    background:var(--surface); color:var(--text); transition:.16s ease; white-space:nowrap;
    display:inline-flex; align-items:center; gap:7px;
  }
  .btn:hover{ border-color:var(--gold-deep); background:var(--surface-2); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn svg{ width:15px; height:15px; opacity:.85; }
  .btn-ghost{ background:transparent; }
  .btn-primary{
    background:linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#241803;
    border-color:var(--gold-deep); font-weight:700; box-shadow:0 6px 16px rgba(232,176,75,.22);
  }
  .btn-primary:hover{ filter:brightness(1.05); border-color:var(--gold-deep); }
  .btn-danger{ background:transparent; color:var(--danger); border-color:#5a3a36; }
  .btn-danger:hover{ background:rgba(226,112,91,.12); border-color:var(--danger); }
  .btn-icon{ padding:8px; border-color:var(--line); background:transparent; }
  .lbl-sm{ display:inline; }

  /* ---------- Main split ---------- */
  #main{ flex:1 1 auto; display:flex; min-height:0; position:relative; }
  .blockly-wrap{ flex:1.7 1 0; position:relative; min-width:0; }
  #blocklyDiv{ position:absolute; inset:0; }

  .divider{ width:1px; flex:0 0 auto; background:linear-gradient(180deg, transparent, var(--line-2) 18%, var(--line-2) 82%, transparent); }

  .code-wrap{
    flex:1 1 0; min-width:340px; max-width:560px; display:flex; flex-direction:column;
    background:var(--ink-2); border-left:1px solid var(--line); position:relative;
  }
  .code-head{
    flex:0 0 auto; height:46px; display:flex; align-items:center; gap:10px; padding:0 12px 0 16px;
    border-bottom:1px solid var(--line); position:relative;
  }
  .code-head::before{ content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px; background:linear-gradient(180deg,var(--gold-bright),var(--gold-deep)); }
  .code-title{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .code-flow{ font-size:11px; color:var(--muted-2); letter-spacing:.04em; }
  .code-flow b{ color:var(--gold); font-weight:600; }
  .code-head .right{ margin-left:auto; display:flex; gap:6px; align-items:center; }

  .code-scroll{ flex:1 1 auto; overflow:auto; background:var(--code-bg); position:relative; }
  .code-inner{ display:flex; min-height:100%; min-width:max-content; }
  .gutter, .code{
    font-family:var(--mono); font-size:13px; line-height:1.62; font-variant-ligatures:none;
    padding-top:14px; padding-bottom:24px;
  }
  .gutter{
    position:sticky; left:0; z-index:2; flex:0 0 auto; text-align:right;
    padding-left:16px; padding-right:12px; color:var(--muted-2); user-select:none;
    background:var(--code-bg); border-right:1px solid #15203200; white-space:pre;
    box-shadow:1px 0 0 var(--line);
  }
  .code{ padding-left:18px; padding-right:24px; white-space:pre; color:var(--code-text); }
  .code code{ font:inherit; color:var(--code-text); }
  .tok-k{ color:var(--tok-k); font-weight:600; }
  .tok-s{ color:var(--tok-s); }
  .tok-c{ color:var(--tok-c); font-style:italic; }
  .tok-n{ color:var(--tok-n); }
  .tok-g{ color:var(--tok-g); }

  .empty{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-align:center; padding:24px; color:var(--muted); pointer-events:none;
  }
  .empty .e-mark{ width:40px; height:40px; opacity:.5; }
  .empty p{ margin:0; font-size:13.5px; max-width:240px; line-height:1.5; }

  .fatal{ margin:24px; padding:20px 22px; color:#ffd9d2; background:rgba(226,112,91,.12);
    border:1px solid var(--danger); border-radius:12px; font-size:14px; line-height:1.55; max-width:440px; }
  .fatal b{ color:#fff; }

  /* mobile floating toggle */
  .fab{ display:none; }

  /* ---------- Modal ---------- */
  .modal{ position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center; padding:20px;
    background:rgba(6,10,18,.66); backdrop-filter:blur(4px); }
  .modal.show{ display:flex; animation:fade .18s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .dialog{ width:min(520px,100%); background:var(--surface); border:1px solid var(--line-2); border-radius:var(--r);
    box-shadow:var(--shadow); overflow:hidden; animation:pop .2s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop{ from{transform:translateY(10px) scale(.98); opacity:0} to{transform:none; opacity:1} }
  .dialog h2{ font-family:var(--display); font-weight:600; font-size:20px; margin:0; padding:20px 22px 6px; }
  .dialog .body{ padding:6px 22px 14px; color:var(--text-soft); font-size:14px; line-height:1.6; }
  .dialog .body p{ margin:10px 0; }
  .dialog .body b{ color:var(--text); }
  .dialog .body ol{ margin:10px 0; padding-left:20px; }
  .dialog .body li{ margin:7px 0; }
  .dialog .body .tip{ background:rgba(232,176,75,.08); border:1px solid rgba(232,176,75,.22); border-radius:10px; padding:11px 13px; font-size:13px; color:var(--text-soft); }
  .dialog .foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 22px 20px; border-top:1px solid var(--line); }

  /* ---- accent button (Tutorial) ---- */
  .btn-accent{ border-color:rgba(232,176,75,.5); color:var(--gold); }
  .btn-accent:hover{ background:rgba(232,176,75,.12); border-color:var(--gold); color:var(--gold-bright); }
  .btn-toggle.on{ background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803; border-color:var(--gold-deep); font-weight:700; box-shadow:0 6px 16px rgba(232,176,75,.22); }
  .btn-toggle.on svg{ stroke:#241803; }

  /* ---- wide modal (tutorial) ---- */
  .dialog.wide{ width:min(900px,100%); display:flex; flex-direction:column; max-height:88vh; }
  .dialog.wide .body{ overflow:auto; flex:1 1 auto; }
  .tut-tabs{ display:flex; flex-wrap:wrap; gap:7px; padding:8px 22px; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:3; background:var(--surface); }
  .tut-tab{ font:inherit; font-size:12.5px; font-weight:600; letter-spacing:.2px; cursor:pointer; color:var(--muted);
    background:var(--chip-bg); border:1px solid var(--line); border-radius:999px; padding:6px 13px; transition:.15s ease; }
  .tut-tab:hover{ color:var(--text); border-color:var(--line-2); }
  .tut-tab.on{ color:#241803; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border-color:var(--gold-deep); }
  .tut-page{ display:none; }
  .tut-page.on{ display:block; animation:fade .2s ease; }
  .tut-page h3{ font-family:var(--display); font-weight:600; font-size:16.5px; color:var(--text); margin:16px 0 6px; }
  .tut-page h3:first-child{ margin-top:4px; }
  .tut-page p{ margin:9px 0; }
  .tut-step{ display:flex; gap:11px; margin:10px 0; align-items:flex-start; }
  .tut-step .n{ flex:none; width:23px; height:23px; border-radius:50%; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .tut-step .tx{ flex:1; }
  .kbd{ background:var(--kbd-bg); border:1px solid var(--line-2); border-bottom-width:2px; border-radius:6px; padding:1px 6px; font-size:12px; font-family:var(--mono,monospace); color:var(--kbd-text); }

  /* ---- explorer tree visual ---- */
  .xtree{ background:var(--ink); border:1px solid var(--line-2); border-radius:12px; padding:11px 13px; margin:12px 0; }
  .xrow{ display:flex; align-items:flex-start; gap:9px; padding:5px 0; font-size:13px; }
  .xrow + .xrow{ border-top:1px dashed var(--hairline); }
  .xrow .ic{ flex:none; width:18px; text-align:center; margin-top:1px; }
  .xrow .meta{ flex:1; }
  .xrow .nm{ color:var(--text); font-weight:700; }
  .xrow .pill{ font-size:10px; font-weight:800; padding:1px 6px; border-radius:999px; margin-left:7px; vertical-align:middle; letter-spacing:.3px; }
  .pill.srv{ background:rgba(120,160,255,.16); color:#a9c2ff; }
  .pill.cli{ background:rgba(120,230,180,.16); color:#88e7b6; }
  .pill.both{ background:rgba(232,176,75,.16); color:var(--gold-bright); }
  .xrow .ds{ color:var(--muted); font-size:12.5px; margin-top:2px; line-height:1.45; }

  /* ---- compare table ---- */
  .cmp{ width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
  .cmp th, .cmp td{ border:1px solid var(--line-2); padding:8px 11px; text-align:left; vertical-align:top; }
  .cmp th{ background:var(--surface-2); color:var(--text); font-weight:600; }
  .cmp td{ color:var(--text-soft); }
  .cmp td b{ color:var(--text); }

  /* ---- category guide grid ---- */
  .catlist{ display:grid; grid-template-columns:1fr 1fr; gap:5px 18px; margin:10px 0; }
  .catlist div{ font-size:13px; color:var(--text-soft); padding:3px 0; line-height:1.4; }
  .catlist b{ color:var(--text); }
  @media(max-width:640px){ .catlist{ grid-template-columns:1fr; } }

  /* ---- info / block guide panel ---- */
  .ig-search{ position:sticky; top:0; z-index:3; background:var(--surface); padding:4px 0 12px; }
  .ig-search input{ width:100%; box-sizing:border-box; padding:11px 14px; font-size:15px; border-radius:11px;
    border:1px solid var(--line-2); background:var(--surface-2); color:var(--text); outline:none; font-family:inherit; }
  .ig-search input:focus{ border-color:var(--gold); }
  .ig-cat{ margin:0 0 18px; }
  .ig-cat-h{ display:flex; align-items:center; gap:9px; font-weight:800; font-size:15px; color:var(--text); margin:0 0 8px; }
  .ig-dot{ width:13px; height:13px; border-radius:50%; flex:none; box-shadow:0 0 0 2px var(--surface), 0 0 7px rgba(0,0,0,.25); }
  .ig-row{ display:flex; gap:14px; padding:8px 11px; border-radius:9px; align-items:baseline; }
  .ig-row:nth-child(even){ background:var(--surface-2); }
  .ig-name{ flex:none; width:230px; font-weight:700; color:var(--gold-bright); font-size:13.5px; line-height:1.4; }
  .ig-desc{ flex:1; color:var(--text-soft); font-size:13px; line-height:1.45; }
  .ig-empty{ text-align:center; color:var(--muted); padding:30px 0; font-size:14px; }
  @media(max-width:640px){ .ig-row{ flex-direction:column; gap:2px; } .ig-name{ width:auto; } }

  /* ---- examples / starter projects ---- */
  .ex-note{ font-size:13.5px; color:var(--text-soft); line-height:1.5; margin:0 0 16px; }
  .ex-item{ display:flex; align-items:center; gap:14px; padding:14px; border:1px solid var(--line); border-radius:13px; margin:0 0 11px; background:var(--surface-2); }
  .ex-info{ flex:1; min-width:0; }
  .ex-name{ font-weight:800; font-size:15px; color:var(--text); }
  .ex-where{ font-size:12px; color:var(--gold-bright); margin:3px 0; font-weight:600; }
  .ex-desc{ font-size:13px; color:var(--text-soft); line-height:1.45; }
  .ex-load{ flex:none; }
  @media(max-width:640px){ .ex-item{ flex-direction:column; align-items:stretch; } .ex-load{ width:100%; } }

  /* ---- start screen ---- */
  #startScreen{ position:fixed; inset:0; z-index:200; overflow-y:auto;
    background:radial-gradient(1200px 600px at 50% -10%, var(--body-glow), transparent 70%), var(--ink);
    display:flex; align-items:flex-start; justify-content:center; padding:5vh 20px 40px; }
  #startScreen.hidden{ display:none; }
  .start-inner{ width:100%; max-width:760px; }
  .start-hero{ text-align:center; margin:18px 0 30px; }
  .start-logo{ display:inline-flex; align-items:center; gap:12px; font-family:var(--font-display); font-weight:800;
    font-size:clamp(34px, 7vw, 54px); color:var(--text); letter-spacing:-.5px; }
  .start-logo svg{ width:.95em; height:.95em; color:var(--gold-bright); }
  .start-tag{ margin-top:10px; color:var(--text-soft); font-size:clamp(14px,2.6vw,17px); max-width:480px; margin-left:auto; margin-right:auto; line-height:1.5; }
  .start-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:34px; }
  .start-big{ font-size:16px; padding:13px 26px; border-radius:13px; }
  .start-projects-h{ display:flex; align-items:center; justify-content:space-between; margin:0 4px 12px; font-weight:800; font-size:15px; color:var(--text); }
  .start-cloud{ font-size:12px; color:var(--gold-bright); font-weight:600; }
  .start-list{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:560px){ .start-list{ grid-template-columns:1fr; } }
  .start-card{ display:flex; align-items:center; gap:12px; padding:14px 16px; border:1px solid var(--line); border-radius:13px;
    background:var(--surface-2); cursor:pointer; transition:border-color .15s, transform .1s; }
  .start-card:hover{ border-color:var(--gold); transform:translateY(-1px); }
  .start-card-main{ flex:1; min-width:0; }
  .start-card-name{ font-weight:700; color:var(--text); font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .start-card-meta{ font-size:12px; color:var(--muted); margin-top:2px; }
  .start-card-del{ flex:none; width:30px; height:30px; border-radius:8px; border:1px solid var(--line-2); background:transparent;
    color:var(--muted); cursor:pointer; font-size:17px; line-height:1; display:flex; align-items:center; justify-content:center; }
  .start-card-del:hover{ color:var(--danger); border-color:var(--danger); }
  .start-empty{ grid-column:1/-1; text-align:center; color:var(--muted); padding:26px 0; font-size:14px;
    border:1px dashed var(--line-2); border-radius:13px; }
  .start-foot{ text-align:center; margin-top:26px; }
  .start-link{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:13px; text-decoration:underline; font-family:inherit; }
  .start-link:hover{ color:var(--text-soft); }

  /* ---- custom category builder ---- */
  #ccList{ display:flex; flex-direction:column; gap:8px; }
  .cc-cat-row{ display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); }
  .cc-dot{ width:13px; height:13px; border-radius:50%; flex:none; }
  .cc-cat-name{ flex:1; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cc-cat-meta{ font-size:12px; color:var(--muted); }
  .cc-mini{ font:inherit; font-size:12.5px; font-weight:600; padding:5px 11px; border-radius:8px; border:1px solid var(--line-2); background:transparent; color:var(--text-soft); cursor:pointer; }
  .cc-mini:hover{ border-color:var(--gold); color:var(--text); }
  .cc-del:hover{ border-color:var(--danger); color:var(--danger); }
  .cc-empty{ text-align:center; color:var(--muted); padding:22px 10px; font-size:14px; border:1px dashed var(--line-2); border-radius:11px; line-height:1.5; }
  .cc-form{ display:flex; flex-direction:column; }
  .cc-lbl{ font-weight:700; font-size:13px; color:var(--text); margin:14px 0 6px; }
  .cc-lbl:first-child{ margin-top:0; }
  .cc-count{ font-weight:600; color:var(--gold-bright); font-size:12px; margin-left:6px; }
  .cc-input{ width:100%; box-sizing:border-box; padding:10px 13px; font-size:14.5px; border-radius:10px; border:1px solid var(--line-2); background:var(--surface-2); color:var(--text); outline:none; font-family:inherit; }
  .cc-input:focus{ border-color:var(--gold); }
  .cc-colors{ display:flex; flex-wrap:wrap; gap:8px; }
  .cc-sw{ width:30px; height:30px; border-radius:8px; border:2px solid transparent; cursor:pointer; padding:0; outline:none; transition:transform .1s; }
  .cc-sw:hover{ transform:scale(1.1); }
  .cc-sw.on{ border-color:var(--text); box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--gold); }
  .cc-blocks{ max-height:280px; overflow-y:auto; border:1px solid var(--line); border-radius:10px; background:var(--surface-2); padding:5px; margin-top:7px; }
  .cc-blk{ display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:7px; cursor:pointer; font-size:13.5px; }
  .cc-blk:hover{ background:var(--surface); }
  .cc-blk input{ flex:none; width:16px; height:16px; accent-color:var(--gold); cursor:pointer; }
  .cc-blk-lbl{ flex:1; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cc-blk-cat{ font-size:11px; color:var(--muted); flex:none; }
  .cc-hint{ font-size:12px; color:var(--muted); margin-top:9px; line-height:1.45; }

  /* ---- check results ---- */
  .chk-status{ display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:12px; margin:4px 0 16px; font-size:15px; font-weight:700; }
  .chk-status .em{ font-size:26px; line-height:1; }
  .chk-status.ok{ background:rgba(120,230,180,.10); border:1px solid rgba(120,230,180,.32); color:#bff0d6; }
  .chk-status.warn{ background:rgba(232,176,75,.10); border:1px solid rgba(232,176,75,.32); color:#f1deb4; }
  .chk-status.err{ background:rgba(255,120,120,.10); border:1px solid rgba(255,120,120,.34); color:#f4c8c8; }
  .chk-item{ display:flex; gap:11px; padding:11px 13px; border-radius:10px; margin:8px 0; background:var(--chip-bg);
    border:1px solid var(--line); font-size:13.5px; line-height:1.55; color:var(--text-soft); }
  .chk-item .em{ flex:none; font-size:16px; margin-top:1px; }
  .chk-item b{ color:var(--text); }
  .chk-place{ margin-top:16px; background:rgba(232,176,75,.07); border:1px solid rgba(232,176,75,.26); border-radius:12px; padding:14px 16px; }
  .chk-place .hd{ font-weight:800; color:var(--gold); font-size:11px; letter-spacing:.6px; text-transform:uppercase; margin-bottom:7px; }
  .chk-place .pl{ font-size:15.5px; color:var(--text); font-weight:700; margin-bottom:4px; }
  .chk-place .pl b{ color:var(--gold-bright); }
  .chk-place .wy{ font-size:13px; color:var(--text-soft); line-height:1.5; }

  /* ---------- Toast ---------- */
  #toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--surface-2); border:1px solid var(--line-2); color:var(--text);
    padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:600; box-shadow:var(--shadow);
    opacity:0; pointer-events:none; transition:.22s ease; z-index:400; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* Blockly polish + Scratch-style category palette */
  .blocklyToolboxDiv{ border-right:1px solid var(--line); padding:7px 3px; }
  .blocklyFlyout{ z-index:5; }
  .blocklyMainBackground{ stroke:none; }
  .blocklyZoom image, .blocklyZoom>svg{ opacity:.85; }
  .blocklyToolboxCategory{ border-left-width:0 !important; margin:1px 5px; border-radius:10px; padding:2px 6px !important; transition:background .12s ease; }
  .blocklyToolboxCategory:hover{ background:var(--chip-bg); }
  .blocklyToolboxCategory.blocklyToolboxSelected{ background:var(--surface-2) !important; }
  .blocklyTreeRowContentContainer{ display:flex !important; align-items:center; gap:9px; padding:4px 4px !important; }
  .blocklyToolboxCategoryIcon{ width:14px !important; height:14px !important; min-width:14px; border-radius:50%; flex:none; visibility:visible !important;
    background:var(--cat-col,#8893a8); box-shadow:0 0 0 1px rgba(0,0,0,.12) inset; }
  .blocklyToolboxCategoryLabel{ font-family:var(--ui) !important; font-weight:600 !important; font-size:13.5px !important; letter-spacing:.1px; }

  /* light-mode contrast fixes for tinted text */
  :root[data-theme="light"] .chk-status.ok{ color:#1c7a45; }
  :root[data-theme="light"] .chk-status.warn{ color:#9a6a00; }
  :root[data-theme="light"] .chk-status.err{ color:#c0392b; }
  :root[data-theme="light"] .pill.srv{ color:#3553b8; background:rgba(53,83,184,.12); }
  :root[data-theme="light"] .pill.cli{ color:#1c7a45; background:rgba(28,122,69,.12); }
  :root[data-theme="light"] .pill.both{ color:#9a6a00; background:rgba(232,176,75,.18); }
  :root[data-theme="light"] .chk-place .pl b{ color:var(--gold-deep); }
  :root[data-theme="light"] .code-head::before{ opacity:.9; }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px){
    :root{ --hdr:auto; }
    header{ flex-wrap:wrap; padding:10px 12px; gap:10px; }
    .actions{ width:100%; }
    .lbl-sm{ display:none; }
    .btn{ padding:9px 11px; }
    .code-wrap{
      position:fixed; left:0; right:0; top:0; bottom:0; max-width:none; z-index:40;
      transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.8,.2,1); border-left:none;
    }
    #main.show-code .code-wrap{ transform:translateY(0); }
    .divider{ display:none; }
    .fab{
      display:inline-flex; position:fixed; right:16px; bottom:18px; z-index:35;
      align-items:center; gap:8px; padding:13px 18px; border-radius:999px;
      background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#241803;
      border:none; font-weight:700; font-size:14px; font-family:var(--ui);
      box-shadow:0 10px 26px rgba(0,0,0,.4); cursor:pointer;
    }
  }

  function wrapHandler(g, b, header, paramOpen){

  function reindent(g, code){ // add one extra indent level to an already-indented block
    return code.replace(/^(?=.)/gm, g.INDENT);

    br = br.replace(re,'');
    return '-- \u25B6 When the script runs\n' + br + '\n';
  });

  function containerCode(key){
    if (key==='Workspace') return 'workspace';

  R('roblox_find_item', function(b){
    var code = containerCode(F(b,'WHERE'));
    var names = ['N1','N2','N3','N4'].map(function(n){ return F(b,n); }).filter(function(s){ return s && s.trim().length; });
    if (!names.length) return code;
    if (names.length === 1) return code + ':FindFirstChild(' + qstr(names[0]) + ')';
    var walk = 'local o = ' + code;
    names.forEach(function(nm){ walk += '; o = o and o:FindFirstChild(' + qstr(nm) + ')'; });
    return '(function() ' + walk + '; return o end)()';
  });

  /* EASY all-in-one blocks */
  function partResolve(varName, srcExpr){
    return [
      '  local _t = ' + srcExpr,
      '  local ' + varName + ' = _t',
      '  if _t and _t:IsA("Model") then ' + varName + ' = _t.PrimaryPart or _t:FindFirstChild("HumanoidRootPart") end'
    ].join('\n');
  }
  S('roblox_velocity', function(b,g){
    var spd = V(g,b,'SPEED','50'), dir = F(b,'DIR'), vec;
    if (dir==='down') vec = 'Vector3.new(0, -('+spd+'), 0)';
    else if (dir==='forward') vec = '_p.CFrame.LookVector * ('+spd+')';
    else if (dir==='back') vec = '_p.CFrame.LookVector * -('+spd+')';
    else if (dir==='right') vec = '_p.CFrame.RightVector * ('+spd+')';
    else if (dir==='left') vec = '_p.CFrame.RightVector * -('+spd+')';
    else vec = 'Vector3.new(0, '+spd+', 0)';
    return [
      'do',
      partResolve('_p', V(g,b,'THING','script.Parent')),
      '  if _p and _p:IsA("BasePart") then',
      '    _p.AssemblyLinearVelocity = ' + vec,
      '  end',
      'end'
    ].join('\n');
  });
  S('roblox_stop_moving', function(b,g){
    return [
      'do',

  function touchDebounceBlock(thingExpr, bodyLines){
    return [
      'do',
      '  local _b = ' + thingExpr,
      '  if _b and _b:IsA("BasePart") then',
      '    local _busy = {}',

  function simpleToolbox(xml){
    try {
      var doc = new DOMParser().parseFromString(xml, 'application/xml');
      if (doc.getElementsByTagName('parsererror').length) return xml;
      var keep = {'\u2B50 Easy':1,'Events':1,'Players':1,'Actions':1,'Properties':1,'GUI':1,'Logic':1,'Loops':1,'Math':1,'Text':1,'Variables':1};
      var root = doc.documentElement;
      Array.prototype.slice.call(root.childNodes).forEach(function(ch){
        if (ch.nodeType !== 1) return;
        if (ch.tagName === 'category'){ if (!keep[ch.getAttribute('name')] && ch.getAttribute('custom-cat') !== '1') root.removeChild(ch); }
        else if (ch.tagName === 'sep'){ root.removeChild(ch); }
      });
      return new XMLSerializer().serializeToString(doc);
    } catch(e){ return xml; }
  }

  /* ============ Code generation + syntax highlight ============ */
  var gutter = document.getElementById('gutter');
  var codeOut = document.getElementById('codeOut');
  var emptyEl = document.getElementById('empty');
  var lastCode = '';

  var KW = {};
  ['and','break','do','else','elseif','end','false','for','function','if','in','local','nil','not','or','repeat','return','then','true','until','while','continue']
    .forEach(function(w){ KW[w]=1; });
  var GLOB = {};
  ['game','workspace','script','Instance','Vector3','Color3','CFrame','BrickColor','Enum','task','wait','print','warn','pairs','ipairs','tostring','tonumber','math','string','table','typeof','Vector2','UDim2','UDim','Random','os','tick','spawn','delay']
    .forEach(function(w){ GLOB[w]=1; });

  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  var RX = /(--\[\[[\s\S]*?\]\]|--[^\n]*)|("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(\b\d+(?:\.\d+)?\b)|(\b[A-Za-z_]\w*\b)/g;
  function highlight(code){
    return esc(code).replace(RX, function(m, c, s, n, w){
      if (c) return '<span class="tok-c">' + c + '</span>';
      if (s) return '<span class="tok-s">' + s + '</span>';
      if (n) return '<span class="tok-n">' + n + '</span>';
      if (w){
        if (KW[w]) return '<span class="tok-k">' + w + '</span>';
        if (GLOB[w]) return '<span class="tok-g">' + w + '</span>';
        return w;
      }
      return m;
    });
  }

  function renderCode(code){
    var lines = code.length ? code.split('\n') : [];
    while (lines.length && lines[lines.length-1] === '') lines.pop();
    var nums = [];
    for (var i=0;i<lines.length;i++) nums.push(i+1);
    gutter.textContent = nums.join('\n');
    codeOut.innerHTML = lines.length ? highlight(lines.join('\n')) : '';
    emptyEl.style.display = lines.length ? 'none' : 'flex';
  }

  /* Declare workspace variables as locals at the very top, so a variable set in one
     event is shared correctly across every other event (upvalues), and Roblox doesn't
     complain about globals. */
  (function(){
    var G = Blockly.Lua; if (!G || G.__varHoist) return; G.__varHoist = true;
    var _finish = G.finish;
    G.finish = function(code){
      var decls = '';
      try {
        var models = (Blockly.Variables && Blockly.Variables.allUsedVarModels)
          ? Blockly.Variables.allUsedVarModels(workspace)
          : (workspace.getAllVariables ? workspace.getAllVariables() : []);
        var nt = (Blockly.Names && Blockly.Names.NameType && Blockly.Names.NameType.VARIABLE) || 'VARIABLE';
        var names = [];
        (models || []).forEach(function(m){
          var id = m.getId ? m.getId() : m.name;
          var nm = G.nameDB_ ? G.nameDB_.getName(id, nt) : null;
          if (nm && names.indexOf(nm) < 0) names.push(nm);
        });
        if (names.length) decls = 'local ' + names.join(', ') + '\n\n';
      } catch(e){ decls = ''; }
      return decls + _finish.call(G, code);
    };
  })();

  function generateCode(){

  function sSet(k,v){ try{ return (window.storage&&window.storage.set)?window.storage.set(k,v,false).catch(function(){}):Promise.resolve();}catch(e){return Promise.resolve();} }
  function sDel(k){ try{ return (window.storage&&window.storage.delete)?window.storage.delete(k,false).catch(function(){}):Promise.resolve();}catch(e){return Promise.resolve();} }
  function getIndex(){ return sGet('bs_projects').then(function(v){ try{ return v?JSON.parse(v):[]; }catch(e){ return []; } }); }
  function setIndex(a){ return sSet('bs_projects', JSON.stringify(a)); }
  function projKey(id){ return 'bs_proj_'+id; }
  function newId(){ return 'p'+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36); }
  function wsXml(){ try{ return JSON.stringify(Blockly.serialization.workspaces.save(workspace)); }catch(e){ return '{}'; } }
  function saveProject(id, name){
    var rec = { name:name, xml:wsXml(), updated:Date.now() };
    return sSet(projKey(id), JSON.stringify(rec)).then(function(){
      return getIndex().then(function(idx){
        var found=false; idx.forEach(function(e){ if(e.id===id){ e.name=name; e.updated=rec.updated; found=true; } });
        if(!found) idx.unshift({ id:id, name:name, updated:rec.updated });
        return setIndex(idx);
      });
    });
  }
  function loadProjectRec(id){ return sGet(projKey(id)).then(function(v){ if(!v)return null; try{ return JSON.parse(v); }catch(e){ return null; } }); }
  function deleteProject(id){ return sDel(projKey(id)).then(function(){ return getIndex().then(function(idx){ return setIndex(idx.filter(function(e){return e.id!==id;})); }); }); }

                       'roblox_on_player_added','roblox_on_player_removing','roblox_on_character_added','roblox_on_died',
                       'roblox_on_key','roblox_on_heartbeat','roblox_on_remote_server','roblox_on_remote_client','roblox_text_button_click','roblox_on_property_changed','roblox_on_attribute_changed','roblox_on_tool_activated','roblox_on_tool_equipped',
                       'roblox_jump_pad','roblox_spin_part','roblox_kill_part','roblox_damage_part','roblox_heal_part','roblox_speed_part','roblox_coin_part','roblox_teleport_part','roblox_message_part',
                       'procedures_defnoreturn','procedures_defreturn'];

  var BLOCK_LABELS = {
    roblox_move_to:'move … to', roblox_set_cframe:'set … location', roblox_get_cframe:'… ’s location',
    roblox_get_position:'… ’s position', roblox_set_velocity:'set … velocity', roblox_get_velocity:'… ’s velocity',
    roblox_set_angular_velocity:'set … spin', roblox_apply_impulse:'push … with force', roblox_launch:'launch …',
    roblox_velocity_for:'push … for seconds', roblox_paint:'paint …', roblox_set_material:'set … material',
    roblox_anchor:'anchor …', roblox_weld:'weld …', roblox_set_network_owner:'give physics control',
    roblox_mass:'… ’s mass', roblox_change_health:'change … health', roblox_kill:'kill …',
    roblox_walkspeed:'set walk speed', roblox_jump_power:'set jump power', roblox_play_anim:'play animation',
    roblox_knockback:'knock back', roblox_launch_hold:'launch & hold', roblox_combo_hold:'hold floating', roblox_release_hold:'release hold',
    roblox_create_prompt:'add a prompt', roblox_text_button_click:'when button clicked',
    roblox_change_property:'change a property', roblox_change_attribute:'change an attribute', roblox_value_object:'make a value', roblox_stop_anims:'stop animations', roblox_clamp:'clamp',
    roblox_health_bar:'health bar', roblox_make_label:'show a label', roblox_set_gui_text:'set label text', roblox_make_button:'make a button', roblox_make_tool:'make a tool', roblox_on_tool_activated:'when tool used', roblox_on_tool_equipped:'when tool equipped',
    roblox_velocity:'make … move', roblox_stop_moving:'stop … moving', roblox_jump_pad:'jump pad', roblox_spin_part:'spin …', roblox_kill_part:'kill brick', roblox_damage_part:'damage part', roblox_heal_part:'healing part', roblox_speed_part:'speed pad', roblox_coin_part:'coin', roblox_teleport_part:'teleporter', roblox_message_part:'touch message',
    roblox_on_touched:'when … is touched', roblox_on_touch_ended:'when … stops being touched',
    roblox_on_clicked:'when … is clicked', roblox_on_prompt:'when … is triggered',
    roblox_on_player_added:'when a player joins', roblox_on_player_removing:'when a player leaves',
    roblox_on_character_added:'when … ’s character spawns', roblox_on_remote_server:'when received on the server',
    roblox_on_remote_client:'when received on the client', roblox_on_heartbeat:'every frame',
    roblox_on_run:'when the script runs', roblox_on_key:'when a key is pressed', roblox_on_died:'when … dies'
  };
  function lbl(t){ return BLOCK_LABELS[t] || t.replace('roblox_','').replace(/_/g,' '); }
  var PHYSICAL_INPUTS = {
    roblox_move_to:['OBJECT'], roblox_set_cframe:['OBJECT'], roblox_get_cframe:['OBJECT'], roblox_get_position:['OBJECT'],
    roblox_set_velocity:['OBJECT'], roblox_get_velocity:['OBJECT'], roblox_set_angular_velocity:['OBJECT'],
    roblox_apply_impulse:['OBJECT'], roblox_launch:['OBJECT'], roblox_velocity_for:['OBJECT'],
    roblox_paint:['OBJECT'], roblox_set_material:['OBJECT'], roblox_anchor:['OBJECT'],
    roblox_weld:['A','B'], roblox_set_network_owner:['OBJECT'], roblox_mass:['OBJECT'],
    roblox_knockback:['TARGET','ATTACKER'], roblox_launch_hold:['TARGET'], roblox_combo_hold:['TARGET','ATTACKER'], roblox_release_hold:['TARGET'],
    roblox_create_prompt:['OBJECT'],
    roblox_velocity:['THING'], roblox_stop_moving:['THING'], roblox_jump_pad:['THING'], roblox_spin_part:['THING'], roblox_kill_part:['THING'], roblox_damage_part:['THING'], roblox_heal_part:['THING'], roblox_speed_part:['THING'], roblox_coin_part:['THING'], roblox_teleport_part:['THING','TARGET'], roblox_message_part:['THING']
  };
  var HUMANOID_INPUTS = {
    roblox_change_health:['HUMANOID'], roblox_kill:['HUMANOID'],
    roblox_walkspeed:['HUMANOID'], roblox_jump_power:['HUMANOID'], roblox_play_anim:['HUMANOID'], roblox_stop_anims:['HUMANOID']
  };
  var EVENT_PROVIDES = {
    roblox_on_touched:['otherPart'], roblox_on_touch_ended:['otherPart'],
    roblox_on_clicked:['player'], roblox_on_prompt:['player'],
    roblox_on_player_added:['player'], roblox_on_player_removing:['player'],
    roblox_on_character_added:['character'], roblox_on_remote_server:['player','value'],
    roblox_on_remote_client:['value'], roblox_on_heartbeat:['dt']
  };
  var REPORTER_VAR  = { roblox_event_hit:'otherPart', roblox_event_player:'player', roblox_event_character:'character', roblox_event_delta:'dt', roblox_event_value:'value' };
  var REPORTER_NICE = { otherPart:'the touching part', player:'the player', character:'the character', dt:'time since last frame', value:'the data received' };
  function inferKind(b){
    if (!b) return null;
    var t = b.type;
    if (t==='roblox_local_player'||t==='roblox_event_player'||t==='roblox_player_from_part') return 'player';
    if (t==='roblox_common_target'){ var w=b.getFieldValue('WHICH'); if (w==='player'||w==='touchplayer'||w==='localplayer') return 'player'; if (w==='character') return 'character'; if (w==='camera') return 'instance'; if (w==='mousehit') return 'vector'; return 'part'; }
    if (t==='roblox_player_character'||t==='roblox_event_character') return 'character';
    if (t==='roblox_humanoid_of') return 'humanoid';
    if (t==='roblox_all_players'||t==='roblox_get_children'||t==='roblox_get_descendants'||t==='roblox_get_tagged'||t==='lists_create_with'||t==='lists_repeat') return 'list';
    if (t==='roblox_player_name'||t==='text'||t==='roblox_tostring'||t==='roblox_typeof'||t==='text_join') return 'string';
    if (t==='math_number'||t==='roblox_player_userid'||t==='roblox_tonumber'||t==='roblox_distance'||t==='roblox_mass'||t==='roblox_get_time'||t==='roblox_lerp_num'||t==='roblox_round_to'||t==='roblox_clamp'||t==='math_arithmetic'||t==='math_single') return 'number';
    if (t==='logic_boolean'||t==='roblox_is_a'||t==='roblox_has_tag'||t==='logic_compare'||t==='logic_operation'||t==='logic_negate') return 'boolean';
    if (t==='roblox_color3_rgb') return 'color';
    if (t==='roblox_vector3'||t==='roblox_get_position'||t==='roblox_get_velocity'||t==='roblox_mouse_hit') return 'vector';
    if (t==='roblox_cframe'||t==='roblox_cframe_angles'||t==='roblox_get_cframe'||t==='roblox_lookat') return 'cframe';
    if (t==='roblox_body_part') return 'part';
    if (t==='roblox_new_instance'||t==='roblox_find_child'||t==='roblox_find_child_of_class'||t==='roblox_wait_for_child'||t==='roblox_clone'||t==='roblox_root_of'||t==='roblox_workspace'||t==='roblox_script'||t==='roblox_game'||t==='roblox_get_service'||t==='roblox_find_ancestor'||t==='roblox_find_in'||t==='roblox_find_in_deep'||t==='roblox_wait_for_in'||t==='roblox_find_item'||t==='roblox_container') return 'instance';
    return null;
  }
  function enclosingEvent(b){
    var p = b.getSurroundParent();
    while (p){ if (EVENT_BLOCKS.indexOf(p.type) >= 0) return p; p = p.getSurroundParent(); }
    return null;
  }

  function runCheck(){
    var all  = workspace.getAllBlocks(false);
    var tops = workspace.getTopBlocks(false);
    if (!tops.length){
      openModal({ title:'Check your script',
        body:`<div class="chk-status warn"><span class="em">🧩</span><span>Your canvas is empty</span></div>
              <p>Drag a block from a category on the left to begin. A great first block is <b>“when the script runs”</b> from <b>Events</b>.</p>`,
        actions:[{ label:'OK', kind:'primary', onClick:closeModal }] });
      return;
    }
    var items = [];

    // 1) empty value slots → nil
    var empties = 0;
    all.forEach(function(b){
      (b.inputList||[]).forEach(function(inp){
        if (inp.connection && inp.connection.type === INPUT_VALUE){
          if (inp.connection.targetBlock() || inp.connection.getShadowDom()) return;
          if ((b.type==='roblox_call_method'||b.type==='roblox_call_method_return') && inp.name==='ARGS') return;
          if (b.type==='procedures_defreturn' && inp.name==='RETURN') return;
          empties++;
        }
      });
    });
    if (empties) items.push({lvl:'warn', em:'⚠️',
      html:`<b>${empties} empty slot${empties>1?'s':''}.</b> An empty hole becomes <span class="kbd">nil</span> and usually crashes the script. Click each empty bubble and type a value, or drop a block in. This also catches an empty <b>if … then</b> test — for example <span class="kbd">if score &gt; 1</span> with a missing side.`});

    // 2) loose stacks not inside an event
    var orphans = 0;
    tops.forEach(function(b){
      if (b.outputConnection) return;                 // floating value block, harmless
      if (EVENT_BLOCKS.indexOf(b.type) >= 0) return;
      orphans++;
    });
    if (orphans) items.push({lvl:'warn', em:'🔌',
      html:`<b>${orphans} loose block stack${orphans>1?'s':''}.</b> Blocks that aren’t inside a <b>“when …”</b> event (or <b>“when the script runs”</b>) will never run. Snap them under an event from the <b>Events</b> category.`});

    // 3) server + client mix
    var usesClient = all.some(function(b){ return CLIENT_BLOCKS.indexOf(b.type) >= 0; });
    var usesServer = all.some(function(b){ return SERVER_BLOCKS.indexOf(b.type) >= 0; });
    if (usesClient && usesServer) items.push({lvl:'err', em:'❌',
      html:`<b>Server and player blocks are mixed.</b> Player-only blocks (the local player, key presses) can’t share a script with server-only blocks (DataStore, leaderstats, player joins). Split them into a <b>Script</b> on the server and a <b>LocalScript</b> on the player.`});

    // 4) raw-Lua reminder
    var raws = all.filter(function(b){ return b.type==='roblox_raw_statement'||b.type==='roblox_raw_value'; }).length;
    if (raws) items.push({lvl:'ok', em:'✏️',
      html:`You used ${raws} raw-Lua block${raws>1?'s':''} — those are typed by hand, so double-check the spelling. Blocksmith can’t check inside them.`});

    // 5) TYPE checks — e.g. a Player plugged into "move to" / "paint" won't work
    all.forEach(function(b){
      var phys = PHYSICAL_INPUTS[b.type];
      if (phys) phys.forEach(function(nm){
        var k = inferKind(b.getInputTargetBlock(nm));
        if (k === 'player') items.push({lvl:'err', em:'❌',
          html:`<b>${lbl(b.type)}</b> was given <b>the player</b>, but a Player isn’t a Part you can move or paint — that’s why it didn’t work. Use <b>the player’s character</b> instead (Players ▸ “… ’s character”).`});
        else if (k==='number'||k==='string'||k==='boolean'||k==='color'||k==='vector'||k==='cframe') items.push({lvl:'err', em:'❌',
          html:`<b>${lbl(b.type)}</b> needs a part or object, but you plugged in a <b>${k}</b>. Put a part or model there (try “this part”, or find one in <b>Objects</b>).`});
      });
      var hum = HUMANOID_INPUTS[b.type];
      if (hum) hum.forEach(function(nm){
        var k = inferKind(b.getInputTargetBlock(nm));
        if (k && k!=='humanoid' && k!=='instance') items.push({lvl:'warn', em:'🩺',
          html:`<b>${lbl(b.type)}</b> needs a <b>Humanoid</b>, but you gave it ${k==='player'?'a player':(k==='character'?'a character':'a '+k)}. Wrap it in <b>“humanoid of …”</b> from <b>Players</b>.`});
      });
    });

    // 6) event reporters used outside the event that provides them
    all.forEach(function(b){
      var v = REPORTER_VAR[b.type];
      if (!v) return;
      var ev = enclosingEvent(b);
      if (!ev){
        items.push({lvl:'warn', em:'🎯',
          html:`<b>“${REPORTER_NICE[v]}”</b> only works inside the event that gives it. Put it inside the matching <b>“when …”</b> block.`});
      } else if ((EVENT_PROVIDES[ev.type]||[]).indexOf(v) < 0){
        var gives = (EVENT_PROVIDES[ev.type]||[]).map(function(x){ return '“'+REPORTER_NICE[x]+'”'; }).join(', ') || 'nothing extra';
        items.push({lvl:'warn', em:'🎯',
          html:`<b>“${REPORTER_NICE[v]}”</b> isn’t available inside <b>“${lbl(ev.type)}”</b> — that event gives you ${gives}. ${v==='player' ? 'Tip: inside “when … is touched”, use <b>“player from part → the touching part”</b> to get the player.' : ''}`});
      }
    });

    // placement recommendation
    var usesTouch = all.some(function(b){ return ['roblox_on_touched','roblox_on_touch_ended','roblox_on_clicked','roblox_on_prompt'].indexOf(b.type) >= 0; });
    var usesGui = all.some(function(b){
      if (b.type==='roblox_set_text') return true;
      if (b.type==='roblox_new_instance'){ return /Gui|Frame|TextLabel|TextButton|TextBox|ImageLabel|ImageButton/.test(b.getFieldValue('CLASS')||''); }
      return false;
    });
    var place;
    if (usesClient) place = {kind:'LocalScript', where:'StarterPlayer ▸ StarterPlayerScripts', why:'You use the local player or key presses, which only work on a player’s own device.'};
    else if (usesGui) place = {kind:'LocalScript', where:'StarterGui (inside your ScreenGui)', why:'You’re changing on-screen GUI, which lives on each player’s screen.'};
    else if (usesTouch && !usesServer) place = {kind:'Script', where:'inside the Part, in the Workspace', why:'You react to a part being touched or clicked, so the Script should sit inside that part.'};
    else if (usesServer) place = {kind:'Script', where:'ServerScriptService', why:'You use players, leaderstats, or DataStores — these run on the server.'};
    else place = {kind:'Script', where:'ServerScriptService', why:'A normal server Script is the safe default for most game logic.'};

    var hasErr  = items.some(function(i){ return i.lvl==='err'; });
    var hasWarn = items.some(function(i){ return i.lvl==='warn'; });
    var st = hasErr  ? {cls:'err',  em:'❌', tx:'Found something to fix'}
           : hasWarn ? {cls:'warn', em:'⚠️', tx:'Almost there — a couple of tips'}
           :           {cls:'ok',   em:'✅', tx:'No problems found — nice work!'};

    var body = `<div class="chk-status ${st.cls}"><span class="em">${st.em}</span><span>${st.tx}</span></div>`;
    if (items.length) items.forEach(function(i){ body += `<div class="chk-item"><span class="em">${i.em}</span><span>${i.html}</span></div>`; });
    else body += `<p>Every slot is filled and every block sits inside an event. You’re ready to copy it into Roblox Studio. 🎉</p>`;
    body += `<div class="chk-place"><div class="hd">Where to put this script</div>
             <div class="pl">Put a <b>${place.kind}</b> in <b>${place.where}</b></div>
             <div class="wy">${place.why} Want the full map of where things go? Open <b>Tutorial ▸ “Where to put scripts”</b>.</div></div>`;

    openModal({ title:'Check your script', body:body,
      actions:[{ label:'Copy Lua', kind:'ghost', onClick:function(){ var c=document.getElementById('copyBtn'); if(c) c.click(); } },
               { label:'Done', kind:'primary', onClick:closeModal }] });
  }
  var _checkBtn = document.getElementById('checkBtn'); if (_checkBtn) _checkBtn.onclick = runCheck;

     TUTORIAL button — friendly, tabbed walkthrough
     =================================================================== */

      if (a.type === 'field_dropdown') return '[\u25BE]';
      if (a.type === 'field_input') return '[' + (a.text || '\u2026') + ']';
      if (a.type === 'input_value') return '(\u2009)';
      if (a.type === 'input_statement') return '{\u2009\u2026\u2009}';
      return '';
    }).replace(/\s+/g,' ').trim();
  }

  function blockCatalog(){
    var info = {}; BLOCK_DEFS.forEach(function(d){ if (d && d.type) info[d.type] = readableLabel(d); });
    var out = [], seen = {};
    try {
      var doc = new DOMParser().parseFromString('<root>' + buildToolbox(true) + '</root>', 'text/xml');
      var cats = doc.getElementsByTagName('category');
      for (var ci=0; ci<cats.length; ci++){
        var cat = cats[ci];
        if (cat.getAttribute('custom') || cat.getAttribute('custom-cat') === '1') continue;
        var cname = cat.getAttribute('name') || '';
        var kids = cat.children;
        for (var k=0; k<kids.length; k++){
          if ((kids[k].tagName||'').toLowerCase() !== 'block') continue;
          var t = kids[k].getAttribute('type'); if (!t || seen[t]) continue; seen[t] = 1;
          var label = info[t] || (BUILTIN_DESC[t] ? BUILTIN_DESC[t][0] : null) || t.replace(/^roblox_/,'').replace(/_/g,' ');
          out.push({ type:t, label:label, cat:cname });
        }
      }
    } catch(e){}
    return out;
  }

    var BUILTIN = BUILTIN_DESC;
    var info = {};
    BLOCK_DEFS.forEach(function(d){ if (d && d.type) info[d.type] = { label: readableLabel(d), desc: d.tooltip || '' }; });

    var xml = buildToolbox(true);  /* always show every block (basic + pro) in the guide */
    var doc = new DOMParser().parseFromString('<root>' + xml + '</root>', 'text/xml');
    var cats = doc.getElementsByTagName('category');
    var sections = '', total = 0;
    for (var ci=0; ci<cats.length; ci++){
      var cat = cats[ci];
      var name = cat.getAttribute('name') || '';
      var colour = cat.getAttribute('colour') || '#8893a7';
      if (/^#/.test(colour) === false && /^\d+$/.test(colour)) colour = 'hsl(' + colour + ', 62%, 58%)';
      var kids = cat.children, rows = '', seen = {};
      for (var k=0; k<kids.length; k++){
        if ((kids[k].tagName||'').toLowerCase() !== 'block') continue;
        var t = kids[k].getAttribute('type'); if (!t || seen[t]) continue; seen[t] = 1;
        var meta = info[t] || (BUILTIN[t] ? { label:BUILTIN[t][0], desc:BUILTIN[t][1] } : { label: t.replace(/^roblox_/,'').replace(/_/g,' '), desc:'' });
        total++;
        rows += '<div class="ig-row" data-t="' + escAttr((meta.label + ' ' + meta.desc + ' ' + name).toLowerCase()) +
                '"><div class="ig-name">' + esc(meta.label) + '</div><div class="ig-desc">' + esc(meta.desc) + '</div></div>';
      }
      function igRow(nm, de){ total++; return '<div class="ig-row" data-t="' + escAttr((nm + ' ' + de + ' ' + name).toLowerCase()) + '"><div class="ig-name">' + esc(nm) + '</div><div class="ig-desc">' + esc(de) + '</div></div>'; }
      var custom = cat.getAttribute('custom');
      if (!rows && custom === 'VARIABLE'){
        rows = igRow('set [name] to (\u2009)', 'Make / set one of your own named values (like a score or speed). Tap "Create a variable" first.')
             + igRow('[name]', 'Read one of your variables.')
             + igRow('change [name] by (\u2009)', 'Add an amount to a number variable.');
      }
      if (!rows && custom === 'PROCEDURE'){
        rows = igRow('to [name] do \u2026', 'Make your own reusable block (a function) you can call from anywhere.')
             + igRow('to [name] return \u2026', 'Make your own block that gives a value back.')
             + igRow('call [name]', 'Run a block you made.');
      }
      if (rows) sections += '<div class="ig-cat"><div class="ig-cat-h"><span class="ig-dot" style="background:' + colour + '"></span>' + esc(name) + '</div>' + rows + '</div>';
    }

    var body = '<div class="ig-search"><input id="igSearch" type="text" placeholder="Search ' + total + ' blocks\u2026 (try: health, touch, sound, prompt)" autocomplete="off" spellcheck="false"></div>' +
               '<div id="igList">' + sections + '</div><div id="igEmpty" class="ig-empty" style="display:none">No blocks match \u2014 try another word.</div>';

    openModal({
      title:'Block guide \u2014 what every block does', wide:true, body: body,
      actions:[{ label:'Close', kind:'primary', onClick:closeModal }],
      onShow:function(){
        var inp = document.getElementById('igSearch');
        var rows = Array.prototype.slice.call(document.querySelectorAll('.ig-row'));
        var groups = Array.prototype.slice.call(document.querySelectorAll('.ig-cat'));
        var empty = document.getElementById('igEmpty');
        if (!inp) return;
        inp.oninput = function(){
          var q = inp.value.trim().toLowerCase(); var any = false;
          rows.forEach(function(r){ var show = !q || r.getAttribute('data-t').indexOf(q) >= 0; r.style.display = show ? '' : 'none'; if (show) any = true; });
          groups.forEach(function(c){ var vis = c.querySelector('.ig-row:not([style*="none"])'); c.style.display = vis ? '' : 'none'; });
          empty.style.display = any ? 'none' : 'block';
        };
        inp.focus();
      }
    });
  }
  var _infoBtn = document.getElementById('infoBtn'); if (_infoBtn) _infoBtn.onclick = openInfo;
  var _addCatBtn = document.getElementById('addCatBtn'); if (_addCatBtn) _addCatBtn.onclick = openCatManager;

  /* ===================================================================
     EXAMPLES — ready-made working projects you can load with one tap
     =================================================================== */
  var EX_STAMINA = '<xml>' +
    '<block type="roblox_on_run" x="40" y="40"><statement name="DO">' +
      '<block type="roblox_set_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value>' +
        '<value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value>' +
        '<value name="VALUE"><shadow type="math_number"><field name="NUM">100</field></shadow></value>' +
        '<next><block type="controls_whileUntil"><field name="MODE">WHILE</field>' +
          '<value name="BOOL"><block type="logic_boolean"><field name="BOOL">TRUE</field></block></value>' +
          '<statement name="DO"><block type="roblox_wait"><value name="SECONDS"><shadow type="math_number"><field name="NUM">1</field></shadow></value>' +
            '<next><block type="roblox_set_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value>' +
              '<value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value>' +
              '<value name="VALUE"><block type="roblox_clamp">' +
                '<value name="VALUE"><block type="math_arithmetic"><field name="OP">ADD</field>' +
                  '<value name="A"><block type="roblox_get_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value><value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value></block></value>' +
                  '<value name="B"><shadow type="math_number"><field name="NUM">5</field></shadow></value></block></value>' +
                '<value name="MIN"><shadow type="math_number"><field name="NUM">0</field></shadow></value>' +
                '<value name="MAX"><shadow type="math_number"><field name="NUM">100</field></shadow></value></block></value>' +
            '</block></next></block></statement></block></next></block></statement></block>' +
    '<block type="roblox_on_key" x="40" y="380"><field name="KEY">LeftShift</field><statement name="DO">' +
      '<block type="roblox_set_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value>' +
        '<value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value>' +
        '<value name="VALUE"><block type="roblox_clamp">' +
          '<value name="VALUE"><block type="math_arithmetic"><field name="OP">MINUS</field>' +
            '<value name="A"><block type="roblox_get_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value><value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value></block></value>' +
            '<value name="B"><shadow type="math_number"><field name="NUM">20</field></shadow></value></block></value>' +
          '<value name="MIN"><shadow type="math_number"><field name="NUM">0</field></shadow></value>' +
          '<value name="MAX"><shadow type="math_number"><field name="NUM">100</field></shadow></value></block></value></block></statement></block>' +
    '<block type="roblox_on_attribute_changed" x="40" y="560">' +
      '<value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value>' +
      '<value name="OBJECT"><block type="roblox_local_player"></block></value>' +
      '<statement name="DO"><block type="roblox_print"><value name="VALUE"><block type="roblox_get_attribute"><value name="OBJECT"><block type="roblox_local_player"></block></value><value name="NAME"><shadow type="text"><field name="TEXT">Stamina</field></shadow></value></block></value></block></statement></block>' +
    '</xml>';

  var EX_COINS = '<xml>' +
    '<block type="roblox_on_player_added" x="40" y="40"><statement name="DO">' +
      '<block type="roblox_make_leaderstat"><value name="PLAYER"><block type="roblox_event_player"></block></value>' +
        '<value name="NAME"><shadow type="text"><field name="TEXT">Coins</field></shadow></value>' +
        '<value name="START"><shadow type="math_number"><field name="NUM">0</field></shadow></value></block></statement></block>' +
    '<block type="roblox_on_run" x="40" y="220"><statement name="DO">' +
      '<block type="roblox_create_prompt"><value name="OBJECT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value>' +
        '<value name="ACTION"><shadow type="text"><field name="TEXT">Collect coin</field></shadow></value>' +
        '<value name="HOLD"><shadow type="math_number"><field name="NUM">0</field></shadow></value></block></statement></block>' +
    '<block type="roblox_on_prompt" x="40" y="380"><value name="PROMPT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><statement name="DO">' +
      '<block type="roblox_change_stat"><value name="PLAYER"><block type="roblox_event_player"></block></value>' +
        '<value name="NAME"><shadow type="text"><field name="TEXT">Coins</field></shadow></value>' +
        '<value name="AMOUNT"><shadow type="math_number"><field name="NUM">1</field></shadow></value></block></statement></block>' +
    '</xml>';

  var EX_DOOR = '<xml>' +
    '<block type="roblox_on_run" x="40" y="40"><statement name="DO">' +
      '<block type="roblox_create_prompt"><value name="OBJECT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value>' +
        '<value name="ACTION"><shadow type="text"><field name="TEXT">Open</field></shadow></value>' +
        '<value name="HOLD"><shadow type="math_number"><field name="NUM">0</field></shadow></value></block></statement></block>' +
    '<block type="roblox_on_prompt" x="40" y="220"><value name="PROMPT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><statement name="DO">' +
      '<block type="roblox_set_property"><value name="OBJECT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><field name="PROP">CanCollide</field>' +
        '<value name="VALUE"><block type="logic_boolean"><field name="BOOL">FALSE</field></block></value>' +
        '<next><block type="roblox_set_property"><value name="OBJECT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><field name="PROP">Transparency</field>' +
          '<value name="VALUE"><shadow type="math_number"><field name="NUM">0.7</field></shadow></value></block></next></block></statement></block>' +
    '</xml>';

  var EX_KILL = '<xml>' +
    '<block type="roblox_on_touched" x="40" y="40"><value name="PART"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><statement name="DO">' +
      '<block type="roblox_make_local"><field name="NAME">hum</field>' +
        '<value name="VALUE"><block type="roblox_humanoid_of"><value name="MODEL"><block type="roblox_get_property"><value name="OBJECT"><block type="roblox_event_hit"></block></value><field name="PROP">Parent</field></block></value></block></value>' +
        '<next><block type="controls_if">' +
          '<value name="IF0"><block type="roblox_use_local"><field name="NAME">hum</field></block></value>' +
          '<statement name="DO0"><block type="roblox_change_health"><value name="HUMANOID"><block type="roblox_use_local"><field name="NAME">hum</field></block></value>' +
            '<value name="AMOUNT"><shadow type="math_number"><field name="NUM">-100</field></shadow></value></block></statement></block></next></block></statement></block>' +
    '</xml>';

  var EX_HPBAR = '<xml><block type="roblox_on_run" x="40" y="40"><statement name="DO">' +
    '<block type="roblox_health_bar"><value name="COLOR"><shadow type="roblox_color3_rgb">' +
      '<value name="R"><shadow type="math_number"><field name="NUM">80</field></shadow></value>' +
      '<value name="G"><shadow type="math_number"><field name="NUM">220</field></shadow></value>' +
      '<value name="B"><shadow type="math_number"><field name="NUM">120</field></shadow></value></shadow></value></block>' +
    '</statement></block></xml>';

  var EX_WAND = '<xml><block type="roblox_on_tool_activated" x="40" y="40">' +
    '<value name="TOOL"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><statement name="DO">' +
      '<block type="roblox_make_local"><field name="NAME">myHumanoid</field>' +
        '<value name="VALUE"><block type="roblox_humanoid_of"><value name="MODEL"><block type="roblox_get_property"><value name="OBJECT"><shadow type="roblox_common_target"><field name="WHICH">parent</field></shadow></value><field name="PROP">Parent</field></block></value></block></value>' +
        '<next><block type="controls_if"><value name="IF0"><block type="roblox_use_local"><field name="NAME">myHumanoid</field></block></value>' +
          '<statement name="DO0"><block type="roblox_change_health"><value name="HUMANOID"><block type="roblox_use_local"><field name="NAME">myHumanoid</field></block></value>' +
            '<value name="AMOUNT"><shadow type="math_number"><field name="NUM">25</field></shadow></value></block></statement></block></next></block></statement></block></xml>';

  var EXAMPLES = [
    { emoji:'\u26A1', name:'Stamina system', where:'LocalScript in StarterPlayerScripts',
      desc:'Starts at 100, drains 20 when you press Shift, refills 5 every second, stays between 0\u2013100, and prints live in the Output.', xml:EX_STAMINA },
    { emoji:'\u2764\uFE0F', name:'Health bar', where:'LocalScript in StarterPlayerScripts',
      desc:'Adds a health bar to your screen that fills and empties with your HP, with the numbers shown. Take damage to watch it move.', xml:EX_HPBAR },
    { emoji:'\uD83E\uDE84', name:'Healing wand (tool)', where:'Script inside a Tool',
      desc:'A held tool: equip it and click to heal yourself 25 HP. Shows how Tools work. Safe \u2014 only heals the holder.', xml:EX_WAND },
    { emoji:'\uD83E\uDE99', name:'Coins (press E)', where:'Script inside a coin part',
      desc:'Every player gets a Coins stat on the leaderboard. Walk up to the part, press E, and earn a coin.', xml:EX_COINS },
    { emoji:'\uD83D\uDEAA', name:'Press-E door', where:'Script inside the door part',
      desc:'Walk up, press E, and the door turns see-through and walk-through (it \u201Copens\u201D).', xml:EX_DOOR },
    { emoji:'\uD83D\uDC80', name:'Kill brick', where:'Script inside the brick',
      desc:'Touch the part and your character takes 100 damage. Safe \u2014 it ignores things that aren\u2019t a character.', xml:EX_KILL }
  ];

  function loadExample(xml){
    try{
      workspace.clear();
      Blockly.Xml.domToWorkspace(xmlText(xml), workspace);
      if (workspace.scrollCenter) workspace.scrollCenter();
      generateCode();
    }catch(e){}
    closeModal();
  }
  function openExamples(){
    var rows = EXAMPLES.map(function(ex,i){
      return '<div class="ex-item"><div class="ex-info"><div class="ex-name">'+ex.emoji+' '+ex.name+'</div>'+
             '<div class="ex-where">\uD83D\uDCCD '+ex.where+'</div><div class="ex-desc">'+ex.desc+'</div></div>'+
             '<button class="btn btn-primary ex-load" data-i="'+i+'">Load</button></div>';
    }).join('');
    openModal({
      title:'Starter projects \u2014 Load one, then press Play', wide:true,
      body:'<p class="ex-note">Pick a ready-made project to drop onto your canvas. Loading <b>replaces</b> what\u2019s there \u2014 tap <b>Save</b> first if you want to keep your current work. After it loads, copy the Lua into the place shown (\uD83D\uDCCD), press <b>Play</b> in Studio, then change the numbers to make it yours.</p>'+rows,
      actions:[{ label:'Close', kind:'primary', onClick:closeModal }],
      onShow:function(){
        document.querySelectorAll('.ex-load').forEach(function(btn){
          btn.onclick = function(){ loadExample(EXAMPLES[parseInt(btn.getAttribute('data-i'),10)].xml); };
        });
      }
    });
  }
  var _exBtn = document.getElementById('examplesBtn'); if (_exBtn) _exBtn.onclick = openExamples;

  /* ===================================================================
     PRO (Advanced) mode — rebuilds the toolbox with extra blocks
     =================================================================== */
  var SIMPLE = false;
  var MODE = 'normal';
  function applyToolbox(){
    try { workspace.updateToolbox(buildToolbox(ADV, SIMPLE)); } catch(e){}
    try { if (typeof scratchifyToolbox === 'function'){ scratchifyToolbox(); setTimeout(scratchifyToolbox, 30); } } catch(e){}
  }
  function setMode(mode){
    MODE = mode;
    ADV = (mode === 'pro');
    SIMPLE = (mode === 'simple');
    var btn = document.getElementById('modeBtn');
    if (btn){
      btn.setAttribute('data-mode', mode);
      btn.classList.toggle('on', mode !== 'normal');
      var lbl = btn.querySelector('.lbl-sm');
      if (lbl) lbl.textContent = (mode==='simple'?'Simple':mode==='pro'?'Pro':'Normal');
    }
    applyToolbox();
    try { if (window.storage && window.storage.set) window.storage.set('blocksmith_mode', mode); } catch(e){}
  }
  /* keep older helpers working in case anything calls them */
  function setAdv(on){ setMode(on ? 'pro' : 'normal'); }
  function setSimple(on){ setMode(on ? 'simple' : 'normal'); }

  var MODE_ORDER = ['normal','simple','pro'];
  var MODE_MSG = { normal:'Normal mode', simple:'Simple mode \u2014 just the easy all-in-one blocks', pro:'Pro mode \u2014 all blocks unlocked' };
  var _modeBtn = document.getElementById('modeBtn');
  if (_modeBtn) _modeBtn.onclick = function(){
    var next = MODE_ORDER[(MODE_ORDER.indexOf(MODE) + 1) % MODE_ORDER.length];
    setMode(next); toast(MODE_MSG[next]);
  };
  try { if (window.storage && window.storage.get){
    window.storage.get('blocksmith_mode').then(function(r){
      if (r && r.value){ if (r.value !== 'normal') setMode(r.value); }
      else { /* migrate old keys */
        window.storage.get('blocksmith_simple').then(function(s){ if (s && s.value==='1') setMode('simple');
          else window.storage.get('blocksmith_adv').then(function(a){ if (a && a.value==='1') setMode('pro'); }).catch(function(){});
        }).catch(function(){});
      }
    }).catch(function(){});
  } } catch(e){}

  /* ===================================================================
     THEME — light / dark switch (also re-themes the Blockly canvas live)
     =================================================================== */
  function recolorGrid(stroke){
    try {
      blocklyDiv.querySelectorAll('pattern').forEach(function(pat){
        pat.querySelectorAll('line').forEach(function(el){ el.setAttribute('stroke', stroke); });
        pat.querySelectorAll('rect,circle').forEach(function(el){ var fl=el.getAttribute('fill'); if (fl && fl!=='none') el.setAttribute('fill', stroke); });
      });
    } catch(e){}
  }
  function scratchifyToolbox(){
    try {
      blocklyDiv.querySelectorAll('.blocklyToolboxCategory').forEach(function(c){
        var col = getComputedStyle(c).borderLeftColor;
        if (col && col !== 'rgba(0, 0, 0, 0)' && col !== 'transparent') c.style.setProperty('--cat-col', col);
      });
    } catch(e){}
  }
  var THEME = 'dark';
  function applyTheme(mode){
    THEME = (mode === 'light') ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', THEME);
    var tb = document.getElementById('themeBtn');
    if (tb){
      var moon = tb.querySelector('.ico-moon'), sun = tb.querySelector('.ico-sun');
      if (moon) moon.style.display = THEME==='light' ? 'none' : 'block';
      if (sun)  sun.style.display  = THEME==='light' ? 'block' : 'none';
      tb.title = THEME==='light' ? 'Switch to dark mode' : 'Switch to light mode';
    }
    try { workspace.setTheme(THEME==='light' ? lightTheme : theme); } catch(e){}
    recolorGrid(THEME==='light' ? '#D7DCE6' : '#26334d');
    scratchifyToolbox();
    setTimeout(scratchifyToolbox, 30);
    try { if (window.storage && window.storage.set) window.storage.set('blocksmith_theme', THEME); } catch(e){}
  }
  var _themeBtn = document.getElementById('themeBtn');
  if (_themeBtn) _themeBtn.onclick = function(){ applyTheme(THEME==='light' ? 'dark' : 'light'); toast(THEME==='light' ? 'Light mode \u2600' : 'Dark mode \u263E'); };
  // initial palette dots + grid, then restore the saved theme
  scratchifyToolbox();
  setTimeout(scratchifyToolbox, 60);
  recolorGrid('#26334d');
  try { if (window.storage && window.storage.get){ window.storage.get('blocksmith_theme').then(function(r){ if (r && r.value === 'light') applyTheme('light'); }).catch(function(){}); } } catch(e){}

  /* mobile code panel toggle */
  var main = document.getElementById('main');
  document.getElementById('toggleCode').onclick = function(){ main.classList.add('show-code'); };
  document.getElementById('closeCode').onclick = function(){ main.classList.remove('show-code'); };
  function syncCloseBtn(){
    document.getElementById('closeCode').style.display = (window.innerWidth <= 880) ? 'inline-flex' : 'none';
  }
  syncCloseBtn();

  /* resize handling */
  function doResize(){ Blockly.svgResize(workspace); syncCloseBtn(); }
  window.addEventListener('resize', doResize);
  setTimeout(doResize, 50);

  /* go */
  boot();
  }

  function showFatal(msg){
    var d = document.getElementById('blocklyDiv');
    if (d){ d.innerHTML = '<div class="fatal"><b>Couldn\u2019t start the editor.</b><br>' + msg + '</div>'; }
  }
  var __tries = 0;
  (function ready(){
    if (window.Blockly && window.Blockly.inject && window.Blockly.Lua && window.Blockly.Lua.forBlock){
      try { start(); }
      catch(e){ showFatal((e && e.message) ? e.message : String(e)); }
      return;
    }
    if (__tries++ > 120){
      showFatal('The block engine could not be loaded from the internet. Please check your connection and reload the page.');
      return;
    }
    setTimeout(ready, 50);
  })();
})();
</script>
